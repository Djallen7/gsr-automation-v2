{id:"m10",num:10,phase:"Distribution",stage:"published",title:"YouTube: the Anchor (Private-First)",
 subtitle:"The canonical URL the others point at. The audit gate, not quota, is the real constraint.",
 mat:"manual",
 predict:{q:"Until Google audits your API project, what state are API-uploaded videos forced into?",
  opts:[{t:"Private, irreversibly per video",ok:1,why:"Right. Pre-audit, every API upload is locked private and you cannot un-hold a past one. Phase 1: upload private, a human flips public. Start the audit now."},
        {t:"Public immediately",ok:0,why:"Not until the audit clears. Pre-audit uploads are forced private."},
        {t:"Unlisted",ok:0,why:"It is private, not unlisted, and the lock is irreversible per video."}]},
 lesson:"<p>YouTube is the <b>anchor</b> and the canonical URL the other platforms point at. Upload via the official <b>googleapis</b> Node client (<code class='inl'>videos.insert</code>, resumable, it handles chunking and retries), run on the Mac.</p><p>The catch is the <b>audit gate</b>: until Google audits your API project, <b>every API-uploaded video is locked private, and that lock is irreversible per video</b>. So Phase 1 is <b>upload private, you flip it public</b> (or schedule with <code class='inl'>publishAt</code>, which itself requires privacy=private). <b>Start the audit form now</b>; there is no promised turnaround. Quota is a non-issue (about 100 units/upload, 10,000/day).</p>",
 deeper:"youtubeuploader is dormant (last release Aug 2024), so use the official googleapis client. Fill title/description/tags/category 28/chapters from the templated metadata. Scheduled publish is Monday 4 PM ET. Real playlist IDs (Season 3, Kids Corner, Interviews, The Heavens Declare) are a Daniel TODO; the config still has placeholders.",
 analogy:"A new bank teller on probation. Until the bank certifies them, every deposit they take is held in escrow (private), and you cannot un-hold a past one. You start the certification paperwork now, because nobody tells you how long it takes.",
 game:{type:"order",h:"Build the YouTube publish path",d:"Tap the steps in the order they happen.",
   items:["Master + templated metadata ready","googleapis resumable upload from the Mac","Video lands private (audit still pending)","Human reviews, then flips public or schedules"],
   correct:["Master + templated metadata ready","googleapis resumable upload from the Mac","Video lands private (audit still pending)","Human reviews, then flips public or schedules"],
   why:"Metadata ready, resumable upload from the Mac, lands private under the audit gate, a human flips it public or sets publishAt."},
 quiz:[
  {q:"What does the audit gate do until cleared?",o:["Slows uploads","Locks every API upload private, irreversibly per video","Blocks the API entirely"],a:1,e:"Phase 1 uploads private and a human flips it public; start the audit now."},
  {q:"Which client should the uploader use?",o:["youtubeuploader (dormant since Aug 2024)","The official googleapis Node client","A raw fetch loop"],a:1,e:"googleapis owns resumable chunking and retries and is maintained."}
 ],
 decision:{question:"Lock the YouTube path.",opts:[
   {id:"privatefirst",label:"Private-first via googleapis; human flips public; start the audit now",tag:"recommended",rec:1,why:"Works today despite the audit, keeps a human eye on the first uploads, no rebuild when the audit clears."},
   {id:"autopub",label:"Public auto-publish now via youtubeuploader",tag:"wont work",why:"Pre-audit uploads are forced private anyway, and youtubeuploader is dormant."}],
  specs:[["Client","official googleapis Node client, resumable"],["Runs on","Mac/worker (not Vercel)"],["Phase 1","upload private; human flips public or sets publishAt"],["Unlock","clear the Google API audit (Daniel TODO)"],["Quota","about 100 units/upload, 10k/day (fine)"]]},
 spec:{status:"new",dependsOn:["m9","m8"],blockedBy:["Google API audit (Daniel TODO)","YouTube OAuth credentials in 1Password","Real YouTube playlist IDs (4)"],
  db:"distributions: set platform='youtube' status; store the resulting video URL on episodes.youtube_url.",
  routes:"A jobs row of type 'youtube_upload'; the Mac poller runs it. /distribution tracks status.",
  api:"googleapis videos.insert (resumable) on the Mac. Auth: YouTube OAuth via 1Password service account; code must refresh the token and write it back. Phase 1 privacy=private (publishAt requires private). Category 28.",
  io:"INPUT: master + templated metadata. OUTPUT: a private YouTube video + URL stored; a human flips public.",
  acceptance:["WHEN a YouTube upload job runs THE SYSTEM SHALL use the official googleapis resumable client on the Mac, not Vercel.",
   "WHEN the audit is not cleared THE SYSTEM SHALL upload as private and require a human to flip public or set publishAt.",
   "IF the OAuth token has expired THEN the code SHALL refresh it, write the rotated token back, and alert on failure.",
   "WHEN the upload completes THE SYSTEM SHALL store the video URL and mark the youtube distribution row."],
  verify:["npx tsc --noEmit","npx eslint src/","Manual: run one upload on the Mac to a private video, confirm category 28 + metadata, confirm a human flip-to-public step exists."],
  nonauto:"Clearing the Google audit and flipping the first videos public are Daniel's; the uploader runs on the Mac."},
 toolsKey:"youtube"},

{id:"m11",num:11,phase:"Distribution",stage:null,title:"Rumble, Podcast, Broadcast & OTT",
 subtitle:"The carriers a web search misses. Reconciled to your live platform enum and Vendor Registry.",
 mat:"manual",
 predict:{q:"One StreamHoster FTPS upload does what?",
  opts:[{t:"Feeds Roku, Apple TV, the iOS app, and LG TV at once",ok:1,why:"Right. StreamHoster is a single FTPS upload that fans out to all the TV apps, because YouTube caps TV-app embeds at 480p."},
        {t:"Posts the episode to YouTube",ok:0,why:"No. StreamHoster is the OTT/TV-app feed, separate from YouTube."},
        {t:"Stores a backup only",ok:0,why:"It is the live feed for the TV apps, not just a backup."}]},
 lesson:"<p><b>Rumble:</b> the YouTube-to-Rumble auto-sync is <b>structurally broken</b> (Google throttled it in late 2023, per Rumble's own blog), so do not depend on it. The official Upload API is real but partner-gated and the documented contact (bd@rumble.com) bounced, so Phase 1 is <b>manual upload</b> while you pursue a token through support@rumble.com / live chat / the Partner Program. Also verify Rumble keeps a 58-min cut in HD (it historically drops long videos to 720p, an on-air credibility risk).</p><p><b>Podcast:</b> Fireside's API is <b>read-only</b> (it cannot publish), so migrate to <b>Transistor.fm</b> (real upload API) and <b>301-redirect the Fireside feed</b> after verifying Fireside allows it. Spotify and Apple Podcasts ride the RSS automatically; they are not separate uploads.</p><p><b>Broadcast & OTT (the part a web search misses):</b> <b>StreamHoster</b> is one <b>FTPS</b> upload that fans out to Roku, Apple TV, the iOS app, and LG TV. <b>Real Life Network</b> (= RightNow Media) gets the master via <b>Signiant Media Shuttle</b>, with <b>-20 LKFS</b> normalization and a 1200x1800 portrait thumbnail. <b>Dropbox</b> drops the broadcast master to unnamed network-partner stations (no metadata) and is also the <b>source for OTA broadcast</b>. <b>GSN</b> takes a <b>Roku Direct Publisher JSON feed</b> it polls.</p>",
 deeper:"<b>CTN (Creation TV Network) and WWN are also targets</b> -- filmed and uploaded much less often than the weekly shows, but still built (add them to the distributions enum and give them a delivery/handoff path at a lower cadence). GodTube is retired and c21c is a finished archive already in Dropbox, so those two need no build. The -20 LKFS requirement currently lives only in superseded migration ..002000, so recapture it when RLN delivery is built. Multi-post-by-URL tools (Upload-Post / Blotato) cover YouTube/TikTok/IG/FB/X but not Rumble.",
 analogy:"A shipping dock with several carriers. Rumble lost its forwarding, so you walk those packages in by hand. The podcast moves to a mailbox that can actually send (Transistor), with a forwarding card (the 301). The broadcast carriers each have one loading bay: StreamHoster's single FTPS pallet supplies every TV app at once, Signiant trucks the master to Real Life Network, and Dropbox is the partner stations' pickup shelf.",
 game:{type:"sort",h:"Automatable path, or not?",d:"Sort each target by whether it has an automatable delivery path or stays manual/blocked.",
   binA:"Has an automatable path",binB:"Manual or blocked",
   items:[["Transistor episode upload","A","Real publish API; Spotify/Apple ride the RSS."],
          ["GSN Roku Direct Publisher feed","A","A JSON feed Roku polls (proposed; verify the channel is Direct Publisher)."],
          ["StreamHoster FTPS (feeds the TV apps)","A","One FTPS upload via basic-ftp."],
          ["Signiant to Real Life Network","A","Official Media Shuttle SDK, -20 LKFS."],
          ["Dropbox network-partner drop","A","dropbox-sdk-js, chunked over 150MB."],
          ["Rumble video upload","B","Manual in Phase 1; API is partner-gated."],
          ["YouTube to Rumble sync","B","Structurally broken; do not depend on it."],
          ["Fireside publishing","B","API is read-only; migrate to Transistor."]]},
 quiz:[
  {q:"Why not rely on the YouTube to Rumble sync?",o:["It costs money","Google throttled/blocked it; it is structurally unreliable","Rumble shut down"],a:1,e:"Rumble's own blog confirms it. Build as if it does not exist."},
  {q:"How does the master reach Real Life Network?",o:["Signiant Media Shuttle (RLN = RightNow Media)","A YouTube link","It does not"],a:0,e:"Signiant delivery, with -20 LKFS normalization and a portrait thumbnail."},
  {q:"Why move the podcast off Fireside?",o:["Fireside is closing","Fireside's API is read-only and cannot publish; Transistor can","It is cheaper"],a:1,e:"Migrate and 301-redirect the feed; Spotify/Apple ride the RSS."}
 ],
 decision:{question:"Lock the secondary + broadcast targets.",opts:[
   {id:"manualpursue",label:"Rumble manual (pursue token), Transistor podcast, StreamHoster/Signiant/Dropbox for broadcast, Roku feed for GSN",tag:"recommended",rec:1,why:"Matches your live platform enum; each broadcast carrier has one automatable bay; nothing depends on the dead sync."},
   {id:"waitfire",label:"Wait on the Rumble API, stay on Fireside, skip broadcast/OTT",tag:"blocked",why:"Blocks on a bounced contact, Fireside cannot publish, and drops the TV/OTT outlets entirely."}],
  specs:[["Rumble","manual upload + tracker; pursue token; verify 720p tier"],["Podcast","migrate Fireside to Transistor; 301 (verify first)"],["TV apps","one StreamHoster FTPS upload (Roku/Apple TV/iOS/LG)"],["RLN","Signiant Media Shuttle; -20 LKFS; = RightNow Media"],["Partners","Dropbox drop, no metadata; also the OTA source"],["GSN","Roku Direct Publisher JSON feed; verify channel type"]]},
 spec:{status:"new",dependsOn:["m9","m10"],blockedBy:["Rumble Upload API token (pursue via support@rumble.com)","Fireside 301 permission","GSN Roku channel type confirmation","Transistor + StreamHoster FTPS + Signiant credentials in 1Password"],
  db:"distributions rows for rumble, fireside_podcast (->transistor), streamhoster, real_life_network, dropbox, genesis_science_network. Recapture the -20 LKFS requirement for RLN.",
  routes:"jobs of types: rumble_manual (tracker card), transistor_upload, streamhoster_ftps, signiant_rln, dropbox_partner, gsn_feed (a Roku Direct Publisher JSON route).",
  api:"Transistor publish API (+301 from Fireside). basic-ftp for StreamHoster FTPS. api_client_media_shuttle_node for Signiant (-20 LKFS, 1200x1800 thumb). dropbox-sdk-js chunked >150MB. GSN: a JSON feed Roku polls. Rumble: manual upload now; stub simple-upload.php for when a token lands.",
  io:"INPUT: the master + metadata. OUTPUT: per-target delivery + tracked status; podcast/TV-app/partner fan-out.",
  acceptance:["WHEN the podcast is published THE SYSTEM SHALL use Transistor (Fireside is read-only) and SHALL NOT browser-automate Fireside.",
   "WHEN the TV apps need the episode THE SYSTEM SHALL perform one StreamHoster FTPS upload that feeds Roku, Apple TV, iOS, and LG.",
   "WHEN delivering to Real Life Network THE SYSTEM SHALL use Signiant with -20 LKFS normalization and a 1200x1800 portrait thumbnail.",
   "IF the target is Rumble THEN Phase 1 SHALL be a manual-upload tracker card, never the dead YouTube sync.",
   "WHEN delivering to network partners THE SYSTEM SHALL drop the master to Dropbox with no required metadata (also the OTA source)."],
  verify:["npx tsc --noEmit","npx eslint src/","Manual: confirm Transistor publish + 301 plan; confirm one StreamHoster FTPS upload reaches the TV apps; confirm Signiant -20 LKFS; confirm CTN + WWN have a low-cadence delivery path; confirm GodTube and c21c are NOT built (retired / archived)."],
  nonauto:"Rumble upload is manual in Phase 1; the Rumble token, Fireside 301, and GSN channel type are Daniel TODOs."},
 toolsKey:"secondary"},

{id:"m12",num:12,phase:"Distribution",stage:null,title:"Clips, Scheduling & Secrets",
 subtitle:"Automatable clips with a review gate, on-stack scheduling, and secrets that will not fail silently.",
 mat:"priority",
 predict:{q:"You wire AI clip generation. Should clips post before a human looks?",
  opts:[{t:"No. Generate automatically, but a human approves before publish at first",ok:1,why:"Right. Auto-posting unreviewed AI clips risks an on-air-quality miss. Generate, then a human approves until trust is earned."},
        {t:"Yes, auto-post to save time",ok:0,why:"Too risky early. A bad clip is public and tied to the ministry's name."},
        {t:"Do not do clips at all",ok:0,why:"Clips are valuable; the gate makes them safe."}]},
 lesson:"<p><b>Clips:</b> use <b>Vizard</b>; it ingests 58-min videos, has a public API and a built-in scheduler. Keep a <b>human review gate</b> before anything posts at first. Opus Clip has better AI but its API is enterprise-gated, so it stays manual. Never route the multi-GB master through Make/n8n; pass URLs and let each tool pull.</p><p><b>Scheduling:</b> prefer <b>Supabase Cron to an Edge Function</b> (on-stack, sub-minute, free) over Vercel Cron.</p><p><b>Secrets:</b> a <b>1Password service account</b> injects tokens into unattended jobs via <code class='inl'>op run</code>. The trap: <b>1Password does NOT refresh OAuth tokens for you.</b> Your code must do the refresh exchange and write the rotated token back, with an <b>alert on auth failure</b>, or unattended publishing dies silently.</p>",
 deeper:"Short-form lives in the social_posts enum (youtube_shorts, instagram, tiktok, facebook, x_twitter), separate from distributions. Per-clip tracking is in content_clips / social_posts. ntfy (or email) sends the auth-failure alert. The donation number 931-212-7990 and the locked verbatim lines stay constant in any generated copy.",
 analogy:"A vending machine on a timer with a key card. The timer (Supabase Cron) trips the machine; the key card (1Password) opens it; but the card does not renew its own expiry, so you renew it (refresh the token) or the machine quietly stops dispensing.",
 game:{type:"dial",h:"Set the safe default for each",d:"Pick the right first setting for each piece. Nothing goes full-auto on day one.",
   rows:[["Clips (Vizard)","Generate, human reviews before publish"],
         ["Scheduled jobs","Supabase Cron to Edge Function"],
         ["OAuth tokens","Code refreshes + alert on failure"]],
   distract:["Fully auto immediately","Skip it"],
   why:"Vizard generates but a human approves first; scheduling stays on-stack with Supabase Cron; tokens refresh in your code with an alert so jobs never die silently."},
 quiz:[
  {q:"Why a human review gate on clips at first?",o:["Vizard is slow","Auto-posting unreviewed AI clips risks an on-air-quality miss","It is required by law"],a:1,e:"Generate automatically, but a human approves before publish until trust is earned."},
  {q:"What does 1Password NOT do for you?",o:["Store tokens","Refresh OAuth tokens; your code must do that and alert on failure","Inject env vars"],a:1,e:"Without self-refresh and an alert, unattended publishing dies silently."}
 ],
 decision:{question:"Lock clips, scheduling, and secrets.",opts:[
   {id:"vizardstack",label:"Vizard + review gate, Supabase Cron to Edge, 1Password service account with self-refresh + alert",tag:"recommended",rec:1,why:"Automatable clips with a safety gate, on-stack scheduling, and secrets that will not fail silently."},
   {id:"autoclip",label:"Auto-post clips and run media through Make.com",tag:"risky",why:"Unreviewed clips on air, and Make chokes on multi-GB media."}],
  specs:[["Clips","Vizard API + scheduler; human review gate first"],["No-go","master through Make/n8n; Opus API (enterprise-gated)"],["Schedule","Supabase Cron to Edge Function"],["Secrets","1Password service account; code refreshes OAuth + alerts"]]},
 spec:{status:"new",dependsOn:["m9","m10"],blockedBy:["Vizard API credentials in 1Password","1Password service account set up"],
  db:"content_clips + social_posts (exist) track per-clip status (social_posts enum: youtube_shorts, instagram, tiktok, facebook, x_twitter).",
  routes:"A Supabase Edge Function on a Cron schedule runs due publish jobs. A /clips review page gates posting.",
  api:"Vizard public API + scheduler (pass a URL, not the master). Supabase Cron -> Edge Function (not Vercel Cron). 1Password service account via op run; code performs the OAuth refresh exchange and writes the rotated token back. ntfy alert on auth failure.",
  io:"INPUT: an episode URL. OUTPUT: generated clips held for review, then scheduled posts.",
  acceptance:["WHEN clips are generated THE SYSTEM SHALL hold them for human review before any publish at first.",
   "WHEN a scheduled job is due THE SYSTEM SHALL run it via Supabase Cron to an Edge Function, not Vercel Cron.",
   "IF an OAuth token fails THEN the code SHALL attempt a refresh, write back the rotated token, and send a ntfy/email alert.",
   "IF a workflow would route the multi-GB master through Make/n8n THEN it SHALL be refused (pass URLs instead)."],
  verify:["npx tsc --noEmit","npx eslint src/","Manual: generate clips and confirm the review gate; confirm a Cron Edge Function fires on schedule; simulate a token expiry and confirm refresh + alert."],
  nonauto:"Setting up the 1Password service account and Vizard credentials are Daniel TODOs."},
 toolsKey:"clips"},

{id:"m13",num:13,phase:"Handoff",stage:null,title:"Finish the Build: Hand Your Plan to Claude",
 subtitle:"Export the build plan you enriched through this course, then have a fresh Claude Code session finish the system safely, one reviewed piece at a time.",
 mat:"",
 predict:{q:"You have finished the course. What is the safest way to have Claude build the rest of the system?",
  opts:[{t:"Export the plan, start a fresh Claude session, and have it work on branches with PRs you review",ok:1,why:"Right. A clean session reads the whole plan, then builds one piece at a time on branches you approve. Nothing risky lands without your review."},
        {t:"Tell Claude to build everything at once, straight onto main",ok:0,why:"That skips the review gate and floods main with untested work. One feature per branch keeps every change small and revertible."},
        {t:"Build it yourself by hand to be safe",ok:0,why:"You do not edit code by hand. The safe path is letting Claude work on branches with PRs you review."}]},
 lesson:"<p>This course has been quietly assembling a <b>build spec</b> the whole time: each module's technical spec, every decision you locked, and the <b>Setup</b>, <b>Creds</b>, and <b>Prereqs</b> tracks. At the end you can <b>export</b> all of it as one document. That export is the blueprint Claude builds from.</p><p>The steps are simple. <b>1.</b> Download the export. <b>2.</b> Open a <b>new Claude Code session</b> on the <code class='inl'>gsr-automation-v2</code> repo. <b>3.</b> Paste the export plus a short kickoff prompt. <b>4.</b> Let Claude build <b>feature by feature</b>, each on its own <code class='inl'>feat/</code> branch with a <b>draft PR you review</b> before it counts. You also ask it to build a <b>Pipeline Review</b> page: a single interactive HTML that shows the whole build and flags the fragile or risky points to watch.</p><p>Here is a kickoff prompt you can copy and paste as-is:</p><pre id='m13kick'><code>You are completing the GSR automation build. Read the attached export and the repo docs in docs/_handoff. Build ONE feature at a time on a feat/ branch, open a draft PR, run npx tsc --noEmit and npx eslint src/, never touch ProPresenter, ATEM, Companion, QNAP admin, or Tailscale, and stop for my YES before any live import or distribution. Start with the Prereqs, then module m1.</code></pre><p>And a per-feature prompt to use for each piece after the first:</p><pre id='m13feat'><code>Build the next feature from the plan: module [m-number]. Work on a new feat/ branch, follow that module's spec and acceptance lines exactly, open a draft PR, and run npx tsc --noEmit and npx eslint src/ until both are clean. Summarize the diff in plain English and wait for my review before merging. Do not start the following module yet.</code></pre>",
 deeper:"<p>Ask for the <b>Pipeline Review</b> page with this prompt:</p><pre id='m13rev'><code>Build a single self-contained pipeline-review.html that shows every stage, what was built vs deferred, and flags the fragile points: unattended OAuth expiry, the Rundown Creator HTTP-200-error trap, air-date slippage, and anything that could land on David. Make it open in a browser with no server and no build step.</code></pre><p><b>The agent-team shape.</b> For a big build it helps to split the work: a <b>planning model orchestrates</b> (it reads the plan, picks the order, and reviews results) while <b>cheaper models do the execution and the admin</b> (writing code, running checks, filling boilerplate). That is a supervisor-plus-workers pattern: one head, several hands. It keeps cost down without losing oversight.</p><p><b>What keeps main safe through all of this</b> is unchanged from module 0: every feature lands on its own branch, a draft PR shows the diff, and <code class='inl'>npx tsc --noEmit</code> plus <code class='inl'>npx eslint src/</code> must be clean before a squash merge. The high-stakes live steps still wait for your typed YES.</p>",
 analogy:"It is like handing a trusted builder a detailed blueprint and a punch list. They do not improvise the whole house at once; they finish one room, walk you through it, and only move on once you sign off. The plan is the blueprint; each PR is a finished room you inspect before it counts.",
 game:{type:"sort",h:"Ready to hand over, or still your job first?",d:"Tap each item into the right bin. Some things are part of the plan Claude can build from now; others are decisions or setup only you can do first.",
   binA:"Ready to hand to Claude now",binB:"Still a decision or setup YOU owe first",
   items:[["The per-module build specs","A","These are written and exported; Claude builds straight from them."],
          ["Your locked decisions","A","Every choice you made in the course exports with the plan and guides the build."],
          ["The Prereqs list (table renames, enum additions)","A","These are concrete repo tasks Claude can do on a branch with a PR."],
          ["Google API audit cleared","B","A human Setup item; uploads stay private until it clears, and Claude cannot speed that up."],
          ["Real YouTube playlist IDs","B","Only you can fetch the four real IDs; the config has placeholders until you supply them."],
          ["Confirm GSN channel is Direct Publisher","B","A verification only you can make; the Roku feed only works if the channel is feed-driven."]]},
 quiz:[
  {q:"Why build one feature at a time on branches?",o:["It is slower on purpose","Each change stays small, gets its own PR you review, and is easy to revert if wrong","Branches use less memory"],a:1,e:"One feature per branch keeps every change reviewable and revertible; main never fills with untested work."},
  {q:"Why does a live import or distribution still need a human YES?",o:["The API requires it","Those steps are high-stakes and irreversible, so a person must confirm before they go live","To slow Claude down"],a:1,e:"Going public or pushing to air can land on David; a typed YES keeps a human in the loop on the risky steps."}
 ],
 decision:{question:"Lock how the agent team should proceed.",opts:[
   {id:"oneperbranch",label:"One feature per branch, I review each PR",tag:"recommended",rec:1,why:"Every change is small, reviewable, and revertible, and nothing high-stakes ships without your YES. The safest way to finish a big build."},
   {id:"batched",label:"Batch several low-risk features per PR",tag:"your call",why:"Faster, and fine for tiny low-risk changes, but a bigger PR is harder to review and harder to revert cleanly. Keep high-stakes work one per branch regardless."}],
  specs:[["Order","Prereqs first, then m1 onward in sequence"],["Branch","one feat/ branch + draft PR per feature"],["Gate","tsc + eslint clean, then squash merge; human YES on live steps"]]},

/* ===================== state ===================== */
function fresh(){return{version:3,currentModule:0,step:"predict",modules:{},decisions:{},answers:{},quiz:{},games:{},tools:{},setup:{},theme:"light",sound:false,lastVisited:0};}
function load(){try{var r=store.get(KEY);if(r){var o=JSON.parse(r);if(o&&typeof o==="object")return o;}}catch(e){}return null;}
var S=Object.assign(fresh(),load()||{});
S.modules=S.modules||{};S.decisions=S.decisions||{};S.answers=S.answers||{};S.quiz=S.quiz||{};S.games=S.games||{};S.tools=S.tools||{};S.setup=S.setup||{};
function save(){try{store.set(KEY,JSON.stringify(S));}catch(e){}}
var FIN=M.length;
var $=function(id){return document.getElementById(id);};
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function decidedCount(){return M.filter(function(m){return S.decisions[m.id];}).length;}
function gq(id){return S.quiz[id]||(S.quiz[id]={});}
function gg(id){return S.games[id]||(S.games[id]={});}

/* ===================== gates (the adaptivity engine) ===================== */
function gates(st){
 st=st||S;
 var g={};
 g.m0Aggressive=st.decisions.m0==="aggressive";
 g.m0Staged=st.decisions.m0==="staged";
 g.m1LtRequired=st.decisions.m1==="ltrequired";
 g.m1Locked=!!st.decisions.m1;
 g.m3Locked=!!st.decisions.m3;
 g.m9Locked=!!st.decisions.m9;
 var bg=(st.games&&st.games.m5)||{};
 g.m5BranchPlayed=!!bg.played;
 g.m5BranchPassed=bg.passed===true;
 // mastery: did they get every quiz right first try in a module?
 function mastered(mid){var qz=st.quiz[mid]||{};var mod=M.filter(function(x){return x.id===mid;})[0];if(!mod)return false;if(Object.keys(qz).length<mod.quiz.length)return false;return mod.quiz.every(function(it,i){return qz[i]===it.a;});}
 g.masteredM0=mastered("m0");
 g.masteredM9=mastered("m9");
 g.toolsPicked=function(key){return (st.tools[key]||[]).slice();};
 return g;
}

/* ===================== carryover text (rewritten with real choices) ===================== */
function carryover(m){
 var g=gates();var out=[];
 if(m.id==="m2"&&g.m1Locked){ if(g.m1LtRequired){out.push("From Intake you chose to <b>require the lower-thirds file</b> with every script, so this page assumes the file is always present.");}else{out.push("From Intake you kept the lower-thirds file <b>optional and any-time</b>, so this page can import LTs whenever a script lands.");} }
 if(m.id==="m4"&&g.m3Locked){out.push("Graphics flow is locked, so the rundown pulls those <b>approved graphics</b> (lower thirds never come here).");}
 if(m.id==="m5"&&g.m3Locked){out.push("Only graphics marked <b>Created with a filename</b> in Module 3 become loadable here.");}
 if((m.id==="m10"||m.id==="m11"||m.id==="m12")&&g.m9Locked){out.push("The publish-map architecture is locked, so this target runs heavy work on the <b>Mac/worker</b> via the jobs table and is tracked from the dashboard.");}
 if(m.id==="m9"&&g.m0Aggressive){out.push("You set an aggressive pace in Module 0, but distribution still <b>ships manual-trigger first</b> for safety.");}
 if(!out.length)return "";
 return "<div class='carry'><b>Carryover from your choices.</b> "+out.join(" ")+"</div>";
}
/* reinforcement: inject if a gated concept was missed */
function reinforcement(m){
 var g=gates();
 if(m.id==="m9"&&!g.masteredM0){return "<div class='carry reinforce'><b>Quick reinforcement.</b> Module 0's law still rules here: automation may write the database and call cloud APIs, but the heavy upload runs on the Mac, never the live chain.</div>";}
 return "";
}

/* ===================== pipeline SVG (the centerpiece) ===================== */
var PIPE_W=300, PIPE_PAD=22, PIPE_ROWS=STAGES.length;
function pipePoint(i){ // vertical layout in the rail
 var top=20, gap=(260-0)/(PIPE_ROWS-1);
 return {x: (i%2===0)?70:230, y: top+i*((300-top-10)/(PIPE_ROWS-1))};
}
function currentStageIndex(){
 if(S.currentModule===FIN)return PIPE_ROWS;
 var m=M[S.currentModule];if(!m||!m.stage)return -1;
 for(var i=0;i<STAGES.length;i++){if(STAGES[i].id===m.stage)return i;}
 return -1;
}
function stageDone(i){ // a stage is "done" if its module decision is locked
 var st=STAGES[i];var mod=M[st.mod];return mod&&S.decisions[mod.id];
}
function buildPipe(){
 var wrap=$("pipewrap");if(!wrap)return;
 var curIdx=currentStageIndex();
 var w=PIPE_W,h=320;
 var pts=[];for(var i=0;i<PIPE_ROWS;i++)pts.push(pipePoint(i));
 var path="";for(var j=0;j<pts.length;j++){path+=(j===0?"M":"L")+pts[j].x+" "+pts[j].y+" ";}
 var svg="<svg class='pipe' viewBox='0 0 "+w+" "+h+"' role='img' aria-label='Production pipeline for the example episode DEMO-EP'>";
 svg+="<title>Example episode pipeline. Tap a stage to jump to that module.</title>";
 svg+="<path id='pipepath' d='"+path+"' fill='none' stroke='var(--track)' stroke-width='3' stroke-linecap='round'/>";
 // progress overlay up to current
 if(curIdx>=0){var prog="";var lim=Math.min(curIdx,PIPE_ROWS-1);for(var k=0;k<=lim;k++){prog+=(k===0?"M":"L")+pts[k].x+" "+pts[k].y+" ";}svg+="<path d='"+prog+"' fill='none' stroke='var(--accent)' stroke-width='3' stroke-linecap='round'/>";}
 for(var n=0;n<PIPE_ROWS;n++){
  var p=pts[n];var st=STAGES[n];
  var done=stageDone(n);var cur=(n===curIdx);
  var fill=cur?"var(--accent)":done?"var(--good)":"var(--node)";
  var stroke=cur?"var(--accent)":done?"var(--good)":"var(--line)";
  var ink=(cur||done)?"#fff":"var(--nodeink)";
  svg+="<g class='pnode' data-mod='"+st.mod+"' tabindex='0' role='button' aria-label='"+esc(st.label)+(done?", done":cur?", current":"")+"' style='cursor:pointer'>";
  svg+="<circle cx='"+p.x+"' cy='"+p.y+"' r='13' fill='"+fill+"' stroke='"+stroke+"' stroke-width='2'/>";
  if(done&&!cur){svg+="<path d='M"+(p.x-5)+" "+p.y+" l3 4 l6 -8' fill='none' stroke='#fff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/>";}
  else{svg+="<text x='"+p.x+"' y='"+(p.y+4)+"' text-anchor='middle' font-size='11' font-weight='700' fill='"+ink+"'>"+st.mod+"</text>";}
  var lx=(p.x<150)?p.x+20:p.x-20;var anchor=(p.x<150)?"start":"end";
  svg+="<text x='"+lx+"' y='"+(p.y+4)+"' text-anchor='"+anchor+"' font-size='10.5' fill='var(--ink)'>"+esc(st.label)+"</text>";
  svg+="</g>";
 }
 // token (only if a real stage is active)
 svg+="<circle id='ptoken' cx='"+pts[0].x+"' cy='"+pts[0].y+"' r='6' fill='var(--accent2)' stroke='#fff' stroke-width='2' opacity='0'/>";
 svg+="<text x='"+(w/2)+"' y='"+(h-4)+"' text-anchor='middle' font-size='9.5' fill='var(--dim)'>DEMO-EP (example)</text>";
 svg+="</svg>";
 wrap.innerHTML=svg;
 wrap.querySelectorAll(".pnode").forEach(function(node){
  function go(){var mod=+node.getAttribute("data-mod");S.currentModule=mod;S.step="predict";save();render();window.scrollTo(0,0);}
  node.addEventListener("click",go);
  node.addEventListener("keydown",function(e){if(e.key==="Enter"||e.key===" "){e.preventDefault();go();}});
 });
 animateToken(curIdx,pts);
 // payload accumulation
 var payload=[];for(var q=0;q<=curIdx&&q<PIPE_ROWS;q++){if(STAGES[q].add)payload.push(STAGES[q].add);}
 var pl=$("payload");
 if(curIdx<0){pl.innerHTML="<b>Ground rules</b> set the law before the episode moves.";}
 else if(curIdx>=PIPE_ROWS){pl.innerHTML="Token carries: <b>"+payload.join(" + ")+"</b>. Episode complete.";}
 else{pl.innerHTML="At <b>"+esc(STAGES[curIdx].label)+"</b>, the token carries: "+(payload.length?"<b>"+payload.join(" + ")+"</b>":"<i>nothing yet</i>")+".";}
}
function animateToken(curIdx,pts){
 var tok=$("ptoken");if(!tok)return;
 if(curIdx<0){tok.setAttribute("opacity","0");return;}
 var idx=Math.min(curIdx,PIPE_ROWS-1);
 var target=pts[idx];
 tok.setAttribute("opacity","1");
 if(reduceMotion()){tok.setAttribute("cx",target.x);tok.setAttribute("cy",target.y);return;}
 // animate from previous point to target along a straight hop
 var startX=parseFloat(tok.getAttribute("cx"))||pts[0].x;
 var startY=parseFloat(tok.getAttribute("cy"))||pts[0].y;
 var t0=null,dur=420;
 function step(ts){if(!t0)t0=ts;var k=Math.min(1,(ts-t0)/dur);var e=k<.5?2*k*k:-1+(4-2*k)*k;tok.setAttribute("cx",startX+(target.x-startX)*e);tok.setAttribute("cy",startY+(target.y-startY)*e);if(k<1)requestAnimationFrame(step);}
 requestAnimationFrame(step);
}

/* ===================== render ===================== */
function render(){
 document.body.setAttribute("data-theme",S.theme||"light");
 var main=$("main");main.innerHTML="";
 if(S.currentModule===FIN){$("phaseTag").textContent="Finale";main.appendChild(finale());}
 else if(S.currentModule==="setup"){$("phaseTag").textContent="Setup";main.appendChild(setupView());}
 else{var m=M[S.currentModule];$("phaseTag").textContent=m.phase;main.appendChild(moduleCard(m));}

 var done=decidedCount();
 $("storemode").textContent="Saved in: "+store.mode+". "+done+" of "+M.length+" decisions locked.";

 var mid=$("navMid");

 else{mid.textContent="Module "+M[S.currentModule].num+" of "+(M.length-1);}

 announce(mid.textContent);
}

function stepDone(m,step){
 if(step==="predict")return (S.answers[m.id]&&S.answers[m.id].predict!=null);
 if(step==="interact")return gameWon(m);
 if(step==="quiz")return Object.keys(gq(m.id)).length>=m.quiz.length;
 if(step==="decide")return !!S.decisions[m.id];
 if(step==="lesson")return (S.modules[m.id]&&S.modules[m.id].read);
 return false;
}

  var cls="opt";

  if(chosen===i&&!o.ok)cls+=" sel";

 });

 else if(g.type==="branch"){
  st.choice=st.choice!=null?st.choice:null;
  var scene=document.createElement("div");scene.className="scene";scene.textContent=g.scene;d.appendChild(scene);
  var opts=document.createElement("div");opts.className="opts";
  g.opts.forEach(function(o){var b=document.createElement("button");b.type="button";b.className="opt"+(st.choice===o.id?" sel":"");b.textContent=o.label;b.onclick=function(e){st.choice=o.id;st.played=true;st.passed=!!o.ok;save();confetti(e.clientX,e.clientY);render();};opts.appendChild(b);});
  d.appendChild(opts);
  if(st.choice!=null){var chosen=g.opts.filter(function(x){return x.id===st.choice;})[0];if(chosen){var cq=document.createElement("div");cq.className="conseq "+chosen.conseq.kind;cq.innerHTML="<b>"+(chosen.ok?"&#10003; Outcome":"&#9888; Consequence")+":</b> "+esc(chosen.conseq.text);d.appendChild(cq);
   if(chosen.ok){markWon(m);}else{var rw=document.createElement("button");rw.type="button";rw.className="btn ghost";rw.style.marginTop="8px";rw.textContent=g.rewindLabel;rw.onclick=function(){st.choice=null;save();render();};d.appendChild(rw);}}}
 }
 return d;
}

/* ---- step 3: lesson + analogy + tools ---- */
function lessonView(m){
 var d=document.createElement("div");
 (S.modules[m.id]||(S.modules[m.id]={})).read=true;save();
 var h=carryover(m)+reinforcement(m);
 h+="<div class='lesson'>"+m.lesson+"</div>";
 if(m.deeper){h+="<details><summary>Go deeper</summary><div class='lesson'>"+m.deeper+"</div></details>";}
 h+="<div class='analogy'><b>From your own workflow.</b> "+esc(m.analogy)+"</div>";
 d.innerHTML=h;
 if(m.toolsKey&&TOOLS[m.toolsKey]){d.appendChild(toolsBox(m.toolsKey));}
 return d;
}
function toolsBox(key){
 var list=TOOLS[key];var d=document.createElement("div");d.className="toolsbox";
 d.innerHTML="<h4>Tools you could wire in</h4><div class='sub'>The current recommended pick is marked. Toggle any tool to include it in your exported build plan. Superseded picks are shown struck-through, do not use.</div>";
 var picked=S.tools[key]||(S.tools[key]=[]);
 list.forEach(function(t){
  var on=picked.indexOf(t.id)>=0;
  var b=document.createElement(t.kind==="sup"?"div":"button");if(t.kind!=="sup")b.type="button";
  b.className="tool"+(on?" on":"")+(t.kind==="sup"?" sup":"");
  var pill=t.kind==="rec"?"<span class='pill rec'>recommended</span>":t.kind==="hon"?"<span class='pill'>honorable mention</span>":"<span class='pill sup'>superseded</span>";
  b.innerHTML="<span class='box'>"+(on?"&#10003;":"")+"</span><span><span class='tn'>"+esc(t.name)+"</span>"+pill+"<div class='td'>"+esc(t.d)+"</div></span>";
  if(t.kind!=="sup"){b.onclick=function(){var i=picked.indexOf(t.id);if(i>=0)picked.splice(i,1);else picked.push(t.id);save();render();};}
  d.appendChild(b);
 });
 return d;
}

/* ---- step 4: quiz ---- */
function quizView(m){
 var d=document.createElement("div");var qz=gq(m.id);
 var h="<div class='note'>Quick recall. Each answer reveals why.</div>";
 m.quiz.forEach(function(it,qi){
  h+="<div class='quizq'><div class='qt'>"+(qi+1)+". "+esc(it.q)+"</div><div class='qo' data-q='"+qi+"'>";
  it.o.forEach(function(o,oi){var cls="qopt";if(qi in qz){if(oi===it.a)cls+=" correct";else if(oi===qz[qi])cls+=" wrong";}h+="<button type='button' class='"+cls+"' data-o='"+oi+"'>"+esc(o)+"</button>";});
  h+="</div><div class='qexpl"+((qi in qz)?" show":"")+"'>"+((qi in qz)?((qz[qi]===it.a?"✓ ":"✗ ")+esc(it.e)):"")+"</div></div>";
 });
 d.innerHTML=h;
 d.querySelectorAll(".qo").forEach(function(row){var qi=+row.dataset.q;row.querySelectorAll(".qopt").forEach(function(b){b.onclick=function(e){if(qi in gq(m.id))return;gq(m.id)[qi]=+b.dataset.o;save();if(+b.dataset.o===m.quiz[qi].a)confetti(e.clientX,e.clientY);render();};});});
 return d;
}

/* ---- step 5: decide (locks the build spec) ---- */
function decideView(m){
 var d=document.createElement("div");var dec=m.decision;var ch=S.decisions[m.id];
 var g=gates();
 var h="";
 if(m.gateRender){var gr=m.gateRender(g);if(gr)h+=gr;}
 h+="<div class='note'>Lock the decision. It becomes a build record in your spec with EARS acceptance criteria and a ready-to-paste instruction.</div>";
 h+="<div class='q'><div class='qq'>"+esc(dec.question)+"</div><div class='opts'>";
 dec.opts.forEach(function(o){h+="<button type='button' class='opt"+(ch===o.id?" sel":"")+"' data-id='"+o.id+"'><span class='tag"+(o.rec?" rec":"")+"'>"+esc(o.tag)+"</span>"+esc(o.label)+"<div class='why' style='display:block'>"+esc(o.why)+"</div></button>";});
 h+="</div></div>";
 h+="<div class='h3'>Locked spec</div><table class='tinytable'><tbody>"+dec.specs.map(function(s){return "<tr><td>"+esc(s[0])+"</td><td>"+esc(s[1])+"</td></tr>";}).join("")+"</tbody></table>";
 var tools=(S.tools[m.toolsKey]||[]);
 if(m.toolsKey&&tools.length){var names=tools.map(function(id){var t=TOOLS[m.toolsKey].filter(function(x){return x.id===id;})[0];return t?t.name:id;});h+="<div class='note good'><b>Chosen tools for this stage:</b> "+esc(names.join("; "))+"</div>";}
 h+="<details><summary>Agent-runnable spec (what gets exported)</summary>"+specDetail(m)+"</details>";
 h+="<div class='tell'><b>Tell Claude</b> (this exact block ships in your export).<pre id='tellpre'>"+esc(modulePrompt(m))+"</pre><div class='row' style='margin-top:8px'><button type='button' class='btn ghost' id='cp'>Copy this instruction</button></div></div>";
 d.innerHTML=h;
 d.querySelectorAll(".opt").forEach(function(b){b.onclick=function(e){S.decisions[m.id]=b.dataset.id;save();confetti(e.clientX,e.clientY);toast("Locked Module "+m.num+".");
   if(decidedCount()===M.length){celebrateAll(e.clientX,e.clientY);}render();};});
 var cp=d.querySelector("#cp");if(cp)cp.onclick=function(){copyText(modulePrompt(m));toast("Instruction copied.");};
 return d;
}
function specDetail(m){
 var sp=m.spec;var H="<div class='lesson' style='font-size:12.5px'>";
 H+="<p><b>STATUS:</b> "+esc(sp.status)+"</p>";
 H+="<p><b>DEPENDS ON:</b> "+esc(sp.dependsOn.length?sp.dependsOn.join(", "):"none")+"</p>";
 H+="<p><b>BLOCKED BY:</b> "+esc(sp.blockedBy.length?sp.blockedBy.join("; "):"nothing")+"</p>";
 H+="<p><b>DB CONTRACT:</b> "+esc(sp.db)+"</p>";
 H+="<p><b>ROUTES/FILES:</b> "+esc(sp.routes)+"</p>";

 H+="<p><b>VERIFY:</b></p><ul>"+sp.verify.map(function(v){return "<li>"+esc(v)+"</li>";}).join("")+"</ul>";

}
function modulePrompt(m){
 var sp=m.spec;var o=m.decision.opts.filter(function(x){return x.id===S.decisions[m.id];})[0];
 var tools=(S.tools[m.toolsKey]||[]).map(function(id){var t=(TOOLS[m.toolsKey]||[]).filter(function(x){return x.id===id;})[0];return t?t.name:id;});
 var L=[];
 L.push("MODULE M"+m.num+": "+m.title+" ("+m.phase+(m.mat&&MAT[m.mat]?", "+MAT[m.mat][1]:"")+")");
 L.push("DECISION: "+(o?o.label:"NOT YET LOCKED"));
 L.push("STATUS: "+sp.status);
 L.push("DEPENDS ON: "+(sp.dependsOn.length?sp.dependsOn.join(", "):"none"));
 L.push("BLOCKED BY: "+(sp.blockedBy.length?sp.blockedBy.join("; "):"nothing"));
 L.push("DB CONTRACT: "+sp.db);
 L.push("ROUTES/FILES: "+sp.routes);
 L.push("API CONTRACT: "+sp.api);
 L.push("INPUTS -> OUTPUTS: "+sp.io);
 L.push("ACCEPTANCE CRITERIA (EARS):");sp.acceptance.forEach(function(a){L.push("  - "+a);});
 L.push("VERIFY:");sp.verify.forEach(function(v){L.push("  - "+v);});
 L.push("NON-AUTOMATABLE: "+sp.nonauto);
 if(tools.length)L.push("CHOSEN TOOLS: "+tools.join("; "));
 return L.join("\n");
}

function celebrateAll(x,y){ if(reduceMotion())return; for(var b=0;b<3;b++){setTimeout(function(){confetti(innerWidth*Math.random(),120+Math.random()*200);},b*220);} }

/* ===================== Decisions & Setup view ===================== */
function setupView(){
 var d=document.createElement("div");d.className="card";
 var h="<span class='kick'>Decisions &amp; Setup</span><h2>The human-only inputs</h2><p class='subtitle'>Smart defaults are pre-filled. Confirm or refine; nothing nags. These feed the export's human-blocker list.</p>";
 h+="<div class='h3'>Locked decisions</div>";
 SETUP.filter(function(s){return s.locked;}).forEach(function(s){h+="<div class='note good'><b>"+esc(s.q)+":</b> "+esc(s.answer)+"<div style='color:var(--dim);font-size:12px;margin-top:4px'>"+esc(s.note)+"</div></div>";});
 h+="<div class='h3'>Open items (confirm or refine)</div>";
 SETUP.filter(function(s){return !s.locked;}).forEach(function(s){
  var cur=S.setup[s.id]!=null?S.setup[s.id]:s.def;
  h+="<div class='q'><div class='qq'>"+esc(s.q)+"</div><div class='opts' data-sid='"+s.id+"'>";
  s.opts.forEach(function(o){h+="<button type='button' class='opt"+(cur===o?" sel":"")+"' data-v='"+esc(o)+"'>"+esc(o)+"</button>";});
  h+="</div><div style='color:var(--dim);font-size:12px;margin-top:5px'>"+esc(s.note)+"</div></div>";
 });
 h+="<div class='h3'>Credentials into 1Password</div><div class='note'>Tap each as you store it. Reference items by name only; never paste a secret here.</div>";
 CREDS.forEach(function(c){var on=S.setup["cred_"+c.id]===true;h+="<button type='button' class='tool"+(on?" on":"")+"' data-cred='"+c.id+"'><span class='box'>"+(on?"&#10003;":"")+"</span><span><span class='tn'>"+esc(c.name)+"</span></span></button>";});
 h+="<div class='h3'>Prereq migrations / fixes</div><div class='note'>"+PREREQS.map(function(p){return "&#8226; "+esc(p);}).join("<br>")+"</div>";
 h+="<div class='row' style='margin-top:14px'><button type='button' class='btn ghost' id='bk'>&#8592; Back to modules</button></div>";
 d.innerHTML=h;
 d.querySelectorAll(".opts").forEach(function(row){var sid=row.dataset.sid;row.querySelectorAll(".opt").forEach(function(b){b.onclick=function(){S.setup[sid]=b.dataset.v;save();render();};});});
 d.querySelectorAll("[data-cred]").forEach(function(b){b.onclick=function(){var k="cred_"+b.dataset.cred;S.setup[k]=!S.setup[k];save();render();};});
 d.querySelector("#bk").onclick=function(){S.currentModule=0;S.step="predict";save();render();};
 return d;
}

/* ===================== finale ===================== */
function finale(){
 var d=document.createElement("div");d.className="card";var done=decidedCount();
 var h="<span class='kick'>Finale</span><h2>Your system, designed</h2><p class='subtitle'>Every locked decision is a build record. Export the spec and hand it to a Claude agent team.</p>";
 h+="<div class='note'><b>"+done+" / "+M.length+"</b> decisions locked.</div>";
 if(done===M.length){h+="<div class='celebrate'><b>&#10003; Whole course complete.</b> Your build spec is ready to ship.</div>";}
 M.forEach(function(m){var o=m.decision.opts.filter(function(x){return x.id===S.decisions[m.id];})[0];h+="<div class='bs-row"+(S.decisions[m.id]?" locked":"")+"'><span class='nn'>M"+m.num+"</span><span class='lab'>"+esc(m.title)+"<small>"+(o?esc(o.label):"not yet decided")+"</small></span></div>";});
 h+="<div class='h3'>Export</div><div class='row'><button type='button' class='btn' id='expmd'>Export Build Spec (Markdown)</button><button type='button' class='btn ghost' id='exphtml'>Export (HTML)</button><button type='button' class='btn ghost' id='expjson'>Save state (JSON)</button></div>";
 h+="<div class='h3'>Human blockers / setup</div>"+humanBlockerHTML();
 h+="<div class='row' style='margin-top:14px'><button type='button' class='btn ghost' id='bk2'>&#8592; Back to modules</button><button type='button' class='btn ghost' id='setup2'>Decisions &amp; Setup</button></div>";
 d.innerHTML=h;
 d.querySelector("#expmd").onclick=function(){var n="GSR-Build-Spec-"+new Date().toISOString().slice(0,10)+".md";download(n,planMD(),"text/markdown");toast("Build spec exported (Markdown).");};
 d.querySelector("#exphtml").onclick=function(){var n="GSR-Build-Spec-"+new Date().toISOString().slice(0,10)+".html";download(n,planHTML(),"text/html");toast("Build spec exported (HTML).");};
 d.querySelector("#expjson").onclick=function(){download("course-state.json",JSON.stringify(S,null,2),"application/json");toast("State saved as course-state.json.");};
 d.querySelector("#bk2").onclick=function(){S.currentModule=Math.max(0,M.length-1);save();render();};
 d.querySelector("#setup2").onclick=function(){S.currentModule="setup";save();render();};
 return d;
}
function humanBlockerHTML(){
 var L=[];
 SETUP.filter(function(s){return !s.locked;}).forEach(function(s){var cur=S.setup[s.id]!=null?S.setup[s.id]:s.def;L.push("<b>"+esc(s.q)+":</b> "+esc(cur));});
 var creds=CREDS.filter(function(c){return S.setup["cred_"+c.id]!==true;}).map(function(c){return c.name;});
 if(creds.length)L.push("<b>Credentials still to store in 1Password:</b> "+esc(creds.join(", ")));

/* ===================== executable-spec export ===================== */
function setupAnswersList(){
 var arr=[];
 SETUP.forEach(function(s){ if(s.locked){arr.push(s.q+": "+s.answer+" (locked)");} else {var cur=S.setup[s.id]!=null?S.setup[s.id]:s.def;arr.push(s.q+": "+cur);} });
 var credsDone=CREDS.filter(function(c){return S.setup["cred_"+c.id]===true;}).map(function(c){return c.name;});
 var credsTodo=CREDS.filter(function(c){return S.setup["cred_"+c.id]!==true;}).map(function(c){return c.name;});
 arr.push("1Password credentials stored: "+(credsDone.length?credsDone.join(", "):"none yet"));
 arr.push("1Password credentials still needed: "+(credsTodo.length?credsTodo.join(", "):"none, all stored"));
 return arr;
}
function planMD(){
 var now=new Date().toISOString().slice(0,10);var L=[];
 L.push("# GSR Automation v2 - Build Spec");L.push("");
 L.push("_Generated "+now+". Target repo: gsr-automation-v2. Decisions locked: "+decidedCount()+" / "+M.length+"._");L.push("");
 L.push("## The David Rule");
 L.push("Before any action ask: if this goes wrong, does it land on David on air? Automation reads cloud APIs and writes the database only. Never the live broadcast chain, ProPresenter (GSN-PropRes 100.98.215.7), ATEM, Bitfocus Companion, QNAP admin, or Tailscale. Heavy media runs on the Mac/worker, never on Vercel.");L.push("");
 L.push("## Prereq migrations / fixes (do these first)");PREREQS.forEach(function(p){L.push("- "+p);});L.push("");
 L.push("## Decisions & Setup (human blockers)");setupAnswersList().forEach(function(a){L.push("- "+a);});L.push("");
 L.push("## How to run");
 L.push("Open Claude Code in gsr-automation-v2. Work module by module in order. For each module: paste the MODULE block, build on a feat/ branch with a draft PR, run the VERIFY commands, then squash-merge.");L.push("");
 M.forEach(function(m){
  var o=m.decision.opts.filter(function(x){return x.id===S.decisions[m.id];})[0];var sp=m.spec;
  var tools=(S.tools[m.toolsKey]||[]).map(function(id){var t=(TOOLS[m.toolsKey]||[]).filter(function(x){return x.id===id;})[0];return t?t.name:id;});
  L.push("## M"+m.num+" - "+m.title+"  ("+m.phase+(m.mat&&MAT[m.mat]?", "+MAT[m.mat][1]:"")+")");L.push("");
  L.push("- DECISION: "+(o?o.label:"NOT YET LOCKED"));
  if(o)L.push("  - Why: "+o.why);
  L.push("- STATUS: "+sp.status);
  L.push("- DEPENDS ON: "+(sp.dependsOn.length?sp.dependsOn.join(", "):"none"));
  L.push("- BLOCKED BY: "+(sp.blockedBy.length?sp.blockedBy.join("; "):"nothing"));
  L.push("- DB CONTRACT: "+sp.db);
  L.push("- ROUTES/FILES: "+sp.routes);
  L.push("- API CONTRACT: "+sp.api);
  L.push("- INPUTS -> OUTPUTS: "+sp.io);
  L.push("- ACCEPTANCE CRITERIA (EARS):");sp.acceptance.forEach(function(a){L.push("  - "+a);});
  L.push("- VERIFY:");sp.verify.forEach(function(v){L.push("  - "+v);});
  L.push("- NON-AUTOMATABLE: "+sp.nonauto);
  if(tools.length)L.push("- CHOSEN TOOLS: "+tools.join("; "));
  L.push("");
 });
 var und=M.filter(function(m){return !S.decisions[m.id];});
 L.push("## Open decisions");if(und.length)und.forEach(function(m){L.push("- M"+m.num+" "+m.title);});else L.push("- None, all locked.");L.push("");
 L.push("_End. Build in gsr-automation-v2. Pull before you start, push when you stop._");
 return L.join("\n");
}

/* ===================== top controls + boot ===================== */
function gotoMod(i){S.currentModule=i;S.step="predict";save();render();window.scrollTo(0,0);}
$("btnPipe").onclick=function(){var r=$("rail");r.classList.toggle("open");};
$("btnSetup").onclick=function(){S.currentModule="setup";save();render();window.scrollTo(0,0);};
$("btnSpec").onclick=function(){S.currentModule=FIN;save();render();window.scrollTo(0,0);};
$("btnTheme").onclick=function(){S.theme=(S.theme==="dark"?"light":"dark");save();render();};
$("btnSave").onclick=function(){download("course-state.json",JSON.stringify(S,null,2),"application/json");toast("State saved as course-state.json.");};
$("btnLoad").onclick=function(){$("fileImport").click();};
$("fileImport").onchange=function(e){var f=e.target.files[0];if(f){var r=new FileReader();r.onload=function(){try{var o=JSON.parse(r.result);if(o&&typeof o==="object"){S=Object.assign(fresh(),o);save();render();toast("State loaded.");}}catch(err){toast("Could not read that file.");}};r.readAsText(f);}e.target.value="";};
$("btnReset").onclick=function(){if(confirm("Reset all progress and decisions?")){S=fresh();save();render();}};
$("navPrev").onclick=function(){
 if(S.currentModule==="setup"||S.currentModule===FIN){gotoMod(0);return;}
 if(S.currentModule>0)gotoMod(S.currentModule-1);
};
$("navNext").onclick=function(){
 if(S.currentModule==="setup"){gotoMod(0);return;}
 if(S.currentModule===FIN){gotoMod(0);return;}
 if(S.currentModule<M.length-1)gotoMod(S.currentModule+1);
 else{S.currentModule=FIN;save();render();window.scrollTo(0,0);}
};
