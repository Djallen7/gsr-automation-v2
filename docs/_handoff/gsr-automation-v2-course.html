<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GSR Automation v2 // Crash Course + Build Plan</title>
<style>
:root{
 --bg:#eef2f8;--panel:#ffffff;--ink:#16202e;--dim:#5c6b7e;--line:#e1e8f1;
 --accent:#2563eb;--accentsoft:#e9f1ff;--accent2:#7c3aed;
 --good:#1d8a52;--good-bg:#e6f6ec;--warn:#b7791f;--warn-bg:#fdf3e2;--bad:#c0392b;--bad-bg:#fdecea;
 --gold:#b8860b;--shadow:0 1px 3px rgba(16,32,55,.07),0 6px 20px -10px rgba(16,32,55,.18);
}
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--bg);color:var(--ink);font:14.5px/1.6 -apple-system,Segoe UI,Roboto,Inter,sans-serif}
.app{display:grid;grid-template-columns:300px 1fr;min-height:100vh}
@media(max-width:900px){.app{grid-template-columns:1fr}.rail{position:static!important;height:auto!important}}
header.top{grid-column:1/-1;background:linear-gradient(100deg,#0b1422,#15233c);color:#eaf1ff;padding:12px 20px;display:flex;gap:14px;align-items:center;flex-wrap:wrap;position:sticky;top:0;z-index:20;box-shadow:var(--shadow)}
header h1{font-size:15px;margin:0;font-weight:600}header h1 b{color:#7fb0ff}
.badge{font-size:11px;background:#13243f;color:#9fc1ff;border:1px solid #284a78;border-radius:999px;padding:2px 9px;margin-left:4px}
.xpwrap{margin-left:auto;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.xpbar{width:150px;height:9px;border-radius:999px;background:#1b2940;overflow:hidden;border:1px solid #284a78}
.xpfill{height:100%;background:linear-gradient(90deg,#2563eb,#5cf2a0);width:0;transition:width .5s}
.xpnum{font-size:12px;color:#9fb2cc;font-variant-numeric:tabular-nums}
.toolbar{display:flex;gap:6px;flex-wrap:wrap}
.tbtn{background:#16294a;color:#dce9fb;border:1px solid #2a4a78;border-radius:8px;padding:6px 11px;font-size:12px;cursor:pointer}
.tbtn:hover{background:#1e3a63}
.tbtn.primary{background:#2563eb;border-color:#2563eb;color:#fff}
.rail{background:#0c1626;color:#cdddf2;padding:14px;position:sticky;top:54px;height:calc(100vh - 54px);overflow:auto}
.rail h2{font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:#7f93ad;margin:6px 0 8px}
.mod{display:flex;gap:10px;align-items:center;width:100%;text-align:left;background:#111d31;border:1px solid #1d3050;border-radius:9px;padding:8px 10px;margin-bottom:5px;cursor:pointer;color:inherit}
.mod:hover{border-color:#2f4d78}
.mod.cur{border-color:#2563eb;box-shadow:0 0 0 1px #2563eb inset}
.mod.done .dot{background:var(--good)}
.dot{width:9px;height:9px;border-radius:50%;background:#33476a;flex:0 0 auto}
.mod.cur .dot{background:#2563eb}
.mod .t{font-size:12.5px;flex:1;min-width:0}
.mod .ph{font-size:10px;color:#7f93ad}
.mod .n{font:700 11px ui-monospace,monospace;color:#7f93ad}
.phasehdr{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:#62789a;margin:12px 0 5px;padding-left:2px}
.buildsofar{margin-top:14px;background:#101d31;border:1px solid #1d3050;border-radius:9px;padding:10px}
.buildsofar h3{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:#7f93ad;margin:0 0 6px}
.bsf{font-size:11.5px;color:#bcd0ea;margin:3px 0}
.bsf b{color:#7fe0a8}
main{padding:18px 22px;max-width:900px}
.flow{display:flex;flex-wrap:wrap;gap:3px;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px;margin-bottom:14px;box-shadow:var(--shadow)}
.sbox{font:700 9.5px ui-monospace,monospace;border:1px solid var(--line);background:#f6f9fd;color:var(--dim);border-radius:6px;padding:4px 6px;white-space:nowrap}
.sbox.on{border-color:var(--good);background:var(--good-bg);color:var(--good)}
.sbox.cur{border-color:var(--accent);background:var(--accentsoft);color:var(--accent)}
.sar{color:#b6c2d4;font-size:10px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px;box-shadow:var(--shadow);margin-bottom:14px}
.kick{display:inline-block;font-size:11px;text-transform:uppercase;letter-spacing:.16em;color:var(--accent);background:var(--accentsoft);border:1px solid #cfe0ff;border-radius:999px;padding:2px 10px}
.card h2{margin:8px 0 2px;font-size:22px}
.maturity{display:inline-block;font-size:11px;border-radius:999px;padding:2px 9px;margin-left:6px;border:1px solid}
.mat-manual{background:#eef1f5;border-color:#d7dde6;color:#5c6b7e}
.mat-handoff{background:#f6f0ff;border-color:#d9c4f5;color:#6b3fb0}
.mat-auto{background:#e6f6ec;border-color:#bfe6cd;color:#1d8a52}
.mat-priority{background:#fff4e0;border-color:#f0d29a;color:#9a6a12}
.tabs{display:flex;gap:6px;margin:14px 0 6px;flex-wrap:wrap}
.tab{border:1px solid var(--line);background:#f6f9fd;color:var(--dim);border-radius:999px;padding:7px 15px;font-size:13px;cursor:pointer}
.tab.on{border-color:var(--accent);background:var(--accentsoft);color:var(--accent);font-weight:600}
.tab .mk{color:var(--good);margin-left:5px}
.carry{background:#f0f7ff;border:1px solid #c9e0ff;border-left:3px solid var(--accent);border-radius:8px;padding:9px 12px;margin:10px 0;font-size:13px}
.carry b{color:var(--accent)}
.lesson p{margin:9px 0}
.lesson code{background:#f1f4f9;border:1px solid var(--line);border-radius:4px;padding:1px 5px;font:12.5px ui-monospace,Menlo,monospace}
.analogy{border-left:3px solid var(--gold);background:#fbf6ea;border-radius:8px;padding:10px 13px;margin:11px 0;color:#6b5414}
.analogy b{color:var(--gold)}
.note{background:#f0f7ff;border:1px solid #cfe0ff;border-radius:8px;padding:10px 13px;margin:10px 0}
.note.warn{background:var(--bad-bg);border-color:#f3c9c4}.note.warn b{color:var(--bad)}
.bq{margin:13px 0}.bq .q{font-weight:600;margin-bottom:7px}
.opts{display:flex;flex-direction:column;gap:6px}
.opt{border:1px solid var(--line);background:#fff;border-radius:9px;padding:10px 12px;text-align:left;cursor:pointer;font-size:13.5px}
.opt:hover{border-color:#b9d2ff}
.opt.sel{border-color:var(--accent);background:var(--accentsoft);box-shadow:0 0 0 1px var(--accent) inset}
.opt .why{font-size:12px;color:var(--dim);margin-top:4px}
.opt .tag{float:right;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim)}
.opt .tag.rec{color:var(--good)}
.h3{font-size:12px;text-transform:uppercase;letter-spacing:.14em;color:var(--dim);margin:16px 0 4px}
/* quiz */
.q{margin:12px 0;padding:12px 14px;border:1px solid var(--line);border-radius:10px;background:#fbfdff}
.qt{font-weight:600;margin-bottom:7px}
.qo{display:flex;flex-direction:column;gap:5px}
.qopt{border:1px solid var(--line);border-radius:8px;padding:8px 11px;background:#fff;text-align:left;cursor:pointer;font-size:13px}
.qopt:hover{border-color:#b9d2ff}.qopt.correct{border-color:var(--good);background:var(--good-bg)}.qopt.wrong{border-color:var(--bad);background:var(--bad-bg)}
.qexpl{font-size:12.5px;color:var(--dim);margin-top:7px;display:none}.qexpl.show{display:block}
/* game */
.game{border:1px dashed #bcd6fb;background:#f7fbff;border-radius:11px;padding:14px;margin:10px 0}
.game .gh{font-weight:700;color:var(--accent);font-size:13px;margin-bottom:3px}
.game .gd{font-size:12.5px;color:var(--dim);margin-bottom:10px}
.bins{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:560px){.bins{grid-template-columns:1fr}}
.bin{border:1px solid var(--line);border-radius:9px;background:#fff;padding:8px;min-height:60px}
.bin h4{margin:0 0 6px;font-size:12px}
.chip{display:inline-block;border:1px solid var(--line);background:#fff;border-radius:7px;padding:5px 9px;margin:3px;font-size:12.5px;cursor:pointer}
.chip:hover{border-color:#b9d2ff}
.chip.good{border-color:var(--good);background:var(--good-bg)}.chip.bad{border-color:var(--bad);background:var(--bad-bg)}
.pool{display:flex;flex-wrap:wrap;gap:2px;margin-bottom:8px}
.gfeed{font-size:12.5px;margin-top:9px;font-weight:600}
.gfeed.ok{color:var(--good)}.gfeed.no{color:var(--bad)}
.orderlist{display:flex;flex-direction:column;gap:5px}
.ordit{display:flex;gap:9px;align-items:center;border:1px solid var(--line);border-radius:8px;padding:7px 10px;background:#fff;cursor:pointer;font-size:13px}
.ordit .seq{font:700 11px ui-monospace,monospace;min-width:18px;height:18px;border-radius:5px;background:#e6ecf5;color:#5c6b7e;display:flex;align-items:center;justify-content:center}
.ordit.picked .seq{background:var(--accent);color:#fff}
.trimrow{display:flex;gap:8px;align-items:center;border:1px solid var(--line);border-radius:8px;padding:8px 10px;background:#fff;margin:5px 0;cursor:pointer;font:13px ui-monospace,Menlo,monospace}
.trimrow:hover{border-color:#b9d2ff}.trimrow.pick{border-color:var(--accent);background:var(--accentsoft)}
.cc{margin-left:auto;font:700 11px ui-monospace,monospace}.cc.good{color:var(--good)}.cc.warn{color:var(--warn)}.cc.bad{color:var(--bad)}
.btn{background:var(--accent);color:#fff;border:0;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer}
.btn.ghost{background:#f1f4f9;color:var(--ink);border:1px solid var(--line)}
.nav{display:flex;justify-content:space-between;gap:8px;margin-top:16px}
.tinytable{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:6px}.tinytable td{border:1px solid var(--line);padding:5px 8px}.tinytable td:first-child{font-weight:600;color:var(--accent);white-space:nowrap}
.tell{margin-top:11px;border:1px solid #3d2a10;background:#fbf6ea;border-radius:9px;padding:11px}.tell b{color:var(--gold)}
.tell code{display:block;margin-top:6px;background:#fff;border:1px solid var(--line);border-radius:6px;padding:9px;font:12px ui-monospace,Menlo,monospace;white-space:pre-wrap;color:#2a3a50}
details{border:1px solid var(--line);border-radius:8px;padding:8px 12px;background:#fbfdff;margin:8px 0}summary{cursor:pointer;color:var(--dim);font-size:12.5px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#13243f;color:#eaf1ff;border:1px solid #2a4a78;border-radius:10px;padding:10px 16px;font-size:13px;opacity:0;transition:opacity .25s,bottom .25s;pointer-events:none;z-index:50}.toast.show{opacity:1;bottom:30px}
.spark{position:fixed;width:7px;height:7px;border-radius:50%;pointer-events:none;z-index:60}
.fin h3{color:var(--accent);margin:14px 0 4px}
.chk{display:flex;gap:8px;align-items:flex-start;margin:5px 0;font-size:13px}
.chk .bx{width:15px;height:15px;border-radius:4px;border:1px solid #cdd8e4;flex:0 0 auto;margin-top:2px}.chk .bx.on{background:var(--good);border-color:var(--good)}
</style>

<body>
<div class="app">
  <header class="top">
    <h1>GSR Automation <b>v2</b> // Crash Course + Build Plan <span class="badge" id="phaseTag">Start</span></h1>
    <div class="xpwrap">
      <span class="xpnum"><span id="xpDone">0</span>/<span id="xpTotal">10</span> locked</span>
      <div class="xpbar"><div class="xpfill" id="xpFill"></div></div>
      <div class="toolbar">
        <button class="tbtn primary" id="btnPlan">Export Plan</button>
        <button class="tbtn" id="btnJson">Save</button>
        <button class="tbtn" id="btnImport">Load</button>
        <input type="file" id="fileImport" hidden accept="application/json">
        <button class="tbtn" id="btnReset">Reset</button>
      </div>
    </div>
  </header>
  <aside class="rail">
    <h2>Pipeline</h2>
    <div id="modList"></div>
    <div class="buildsofar"><h3>Your build so far</h3><div id="bsf"></div></div>
    <div class="bsf" id="storeMode" style="margin-top:10px;opacity:.6"></div>
  </aside>
  <main id="main"></main>
</div>
<div class="toast" id="toast"></div>
<script>
/* ===================== storage ===================== */
const store=(()=>{let m={};try{localStorage.setItem('__t','1');localStorage.removeItem('__t');
 return{get:k=>localStorage.getItem(k),set:(k,v)=>localStorage.setItem(k,v),mode:'localStorage'};}
 catch(e){return{get:k=>k in m?m[k]:null,set:(k,v)=>{m[k]=v;},mode:'memory (this tab only)'};}})();
const KEY='gsr_v2_course';

/* ===================== modules (workflow order) ===================== */
/* maturity: how this feature ships first. priority flags distribution. */
const M=[
{id:'m0',num:0,phase:'Ground',station:'RULES',title:'Ground Rules & the Architecture Law',mat:'',
 blueprint:[
  {q:`How do you want to grow into this?`,opts:[`Manual first, automate as I trust it`,`Automate everything fast`,`Stay manual a long time`]},
  {q:`What part of the show can automation never touch?`,opts:[`The live broadcast gear (ProPresenter, ATEM)`,`The database`,`The dashboard`]}
 ],
 lesson:`<p>Four ideas first. <b>Client vs server:</b> the browser is the public storefront, the server is the locked back office where secrets live. <b>Database:</b> a spreadsheet with rules many programs share. <b>API:</b> a defined way for one program to ask another for something. <b>JSON:</b> the labeled note format those requests use.</p>
 <p><b>Git is your undo button:</b> a <code>commit</code> is a save state, a branch is a scratch copy, a squash merge collapses a feature into one clean revertible commit. You build in <code>gsr-automation-v2</code> on branches with draft PRs.</p>
 <p><b>The maturity dial</b> governs every feature: <b>Manual</b> (you do it, the app stores it) then <b>Prompt handoff</b> (the app hands you a ready prompt, you paste it into Claude and paste the result back through the same safety gate) then <b>Auto</b> (the app makes the call itself). Same data, same gate, only who presses the button changes. Automation is the goal; the dial sets the pace.</p>`,
 analogy:`Think of a stove with a safety pilot. The David Rule is the pilot light: it goes on before the gas, every time. The live broadcast chain (ProPresenter on air, the switcher) is the open flame nobody reaches across. Automation works the prep counter, never the burner during service.`,
 game:{type:'sort',h:'The David Rule sorter',d:'Tap each thing into the right bin. Automation may read cloud APIs and write the database only.',
   binA:'Automation MAY touch',binB:'OFF-LIMITS',
   items:[['Supabase database','A'],['YouTube Data API','A'],['Read-only SMB file','A'],['ProPresenter (on air)','B'],['ATEM switcher','B'],['QNAP admin / Tailscale','B']]},
 quiz:[
  {q:`Why does the Claude API key stay on the server?`,o:[`Servers are faster`,`Anything in the browser is readable, so a key there leaks and gets abused`,`Browsers cannot call APIs`],a:1,e:`Browser code is fully visible; a leaked key is scraped in minutes.`},
  {q:`What does a squash merge give you?`,o:[`Faster code`,`One clean revertible commit on main per feature`,`Automatic tests`],a:1,e:`main reads like a changelog and a messy branch collapses to one revertible commit.`}
 ],
 decision:{question:`Lock your workflow and pace.`,opts:[
   {id:'staged',label:`Branches + draft PRs + squash, build in gsr-automation-v2, manual-first dial`,tag:'recommended',rec:1,why:`The seatbelt for AI-directed work: messy exploration on a branch, only the locked result on main, and every feature starts manual then earns automation.`},
   {id:'fast',label:`Commit to main, automate aggressively`,tag:'risky',why:`Fewer steps, but a bad session pollutes main and untrusted automation can reach air.`}],
  specs:[[`Repo`,`gsr-automation-v2`],[`Flow`,`feat/fix branch, draft PR, squash`],[`Dial`,`Manual -> Prompt handoff -> Auto, per feature`]]},
 repo:`gsr-automation-v2 is the architecture of record (Supabase + Next.js 16, ADR-0012). Branches + squash already in use. Build here, never in gsr-blueprint.`,
 tell:`Work in gsr-automation-v2. Always a feat/ or fix/ branch, draft PR, squash merge; run npx tsc --noEmit and npx eslint before commit. Honor the David Rule: automation reads cloud APIs and writes the database only, never ProPresenter/ATEM/Companion/QNAP/Tailscale. Store a per-feature maturity setting (manual/handoff/auto) in app_config so automation is a switch, not a rebuild.`},

{id:'m1',num:1,phase:'Pre-Production',station:'INTAKE',title:'Intake: Scripts + the Lower-Thirds File',mat:'manual',
 blueprint:[
  {q:`How do scripts get into the system first?`,opts:[`I upload them per segment (manual)`,`AI writes them`,`Pulled from Rundown Creator`]},
  {q:`Are lower thirds required when a script is uploaded?`,opts:[`No, the LT file is separate and optional`,`Yes, always together`,`Only for interviews`]}
 ],
 lesson:`<p>You keep your own process for research, guests, outreach, and writing. The system <b>starts by ingesting what you produce.</b> You upload a <b>script per segment</b> as plain teleprompter text; prerecorded segments come in as their <b>transcript</b> instead.</p>
 <p><b>Lower thirds are a separate, optional file</b>, never required at upload, importable at any time for any segment. Parsing that file into rows is deterministic, not AI, so it is safe: upload, preview counts, type YES, it lands. Script writing automation is a later phase; we leave the hook and do not turn it on.</p>`,
 analogy:`Think of a loading dock, not a kitchen. You are not asking the system to cook the meal (write scripts), only to receive the crates (scripts) and the separate parts box (lower thirds) and shelve them correctly.`,
 game:{type:'sort',h:'Route the upload',d:'Where does each item go on intake?',
   binA:'Scripts table',binB:'Lower Thirds (separate file)',
   items:[['Opening monologue teleprompter','A'],['Interview question script','A'],['Prerecorded THD transcript','A'],['The L3 variations document','B'],['Guest chyron lines','B']]},
 quiz:[
  {q:`Why keep lower-thirds import separate from script upload?`,o:[`They are the same thing`,`Lower thirds and graphics are separate systems; the LT file is optional and added any time`,`To save space`],a:1,e:`You insisted: lower thirds and graphics never mix, and the LT file is optional.`},
  {q:`How does a prerecorded segment enter?`,o:[`Someone retypes it`,`As its transcript standing in for the script`,`It is skipped`],a:1,e:`Prerecorded roll-ins come in as transcripts.`}
 ],
 decision:{question:`Lock the intake model.`,opts:[
   {id:'manual',label:`Manual upload: scripts per segment, LT file optional and any-time`,tag:'recommended',rec:1,why:`Works off the bat, keeps your editorial control, and leaves the script-generation hook for later.`},
   {id:'autowrite',label:`AI writes scripts now`,tag:'later',why:`You do not trust auto-scripting yet; deferred to a later phase.`}],
  specs:[[`Scripts`,`one row per (episode, segment), teleprompter text`],[`Lower thirds`,`separate optional file, import any time, deterministic parse`],[`Prerecorded`,`transcript as the script`]]},
 repo:`Uses the scripts table (upsert per episode+segment). The graphics table holds lower thirds (to be renamed lower_thirds). Auto-extraction from scripts stays OFF; LTs come from your file.`,
 tell:`Build manual intake first: upload a script per (episode, segment) into the scripts table; a separate, optional lower-thirds file imports any time into the lower-thirds table via dry-run + type YES. Prerecorded segments ingest as transcripts. Keep script-generation as a deferred hook, do not enable it.`},

{id:'m2',num:2,phase:'Pre-Production',station:'LOWER THIRDS',title:'Lower Thirds: the Variation Picker',mat:'manual',
 blueprint:[
  {q:`How do you choose the final lower third?`,opts:[`Pick 1 of 3 variations per line`,`Always use the first`,`Type a new one`]},
  {q:`Where do approved lower thirds go?`,opts:[`Their own ProPresenter presentation`,`Rundown Creator`,`The graphics tracker`]}
 ],
 lesson:`<p>A clean spreadsheet, one row per lower third. Each row offers <b>three variations</b> (Primary, Var 1, Var 2); you pick one, with a live <b>character count</b> colored against the 55 to 65 band. Then one <b>Send</b> button formats them ALL CAPS, validates the band, asks you to type YES, and pushes to the <b>Lower Thirds presentation</b> in ProPresenter.</p>
 <p>Rules: ALL CAPS; 55 to 65 characters, never over 65; the pipe character only for a <code>NAME | ORG | FIELD</code> chyron; colon for topic lines. Lower thirds <b>never</b> go to Rundown Creator and live in a different ProPresenter presentation than graphics.</p>`,
 analogy:`Like picking the best take of a line read. Three takes are recorded; you listen and circle one, then the whole reel goes to air. You are not rewriting, you are selecting.`,
 game:{type:'trim',h:'Make it fit',d:'Pick the variation that lands in the 55 to 65 band, ALL CAPS, no banned punctuation.',
   options:[['THE GREEN RIVER CUTS STRAIGHT THROUGH A SOLID MOUNTAIN RANGE',60,1],['the green river cuts through a mountain',39,0],['A RIVER THAT, against all odds, CARVES THROUGH HARD ROCK -- WOW',62,0]]},
 quiz:[
  {q:`A chyron assembles to 71 characters. What happens?`,o:[`It ships`,`It is over 65, so it is flagged and trimmed (chyron truncates to 62 + ellipsis)`,`It wraps`],a:1,e:`65 is the hard ceiling.`},
  {q:`Do lower thirds go to Rundown Creator?`,o:[`Yes`,`No, only graphics do; lower thirds have their own ProPresenter presentation`,`Sometimes`],a:1,e:`Lower thirds and graphics are fully separate.`}
 ],
 decision:{question:`Lock the lower-thirds flow.`,opts:[
   {id:'pick3',label:`3-variation picker + char band + one Send to the LT presentation`,tag:'recommended',rec:1,why:`Simple, fast, keeps your eye on the band, and pushes formatted to the right ProPresenter presentation.`},
   {id:'auto',label:`Auto-pick a variation, no review`,tag:'risky',why:`A wrong chyron could reach air; keep the human pick.`}],
  specs:[[`Row`,`beat, l3_type, 3 variations, char count`],[`Rules`,`ALL CAPS, 55-65, pipe only for chyron`],[`Send`,`format + type YES + push to LT presentation (not RC)`]]},
 repo:`Lower thirds = the graphics table today (rename to lower_thirds). 15 l3_type values; regenerate gives 3 variations. Separate from production_graphics.`,
 tell:`Build the Lower Thirds page as a spreadsheet: one row per beat with l3_type and 3 selectable variations, live char count colored against 55-65 (hard ceiling 65, ALL CAPS, pipe only for NAME | ORG | FIELD chyrons). A single Send formats, validates, requires type YES, then pushes the chosen lines to the Lower Thirds ProPresenter presentation. Never push lower thirds to Rundown Creator.`},

{id:'m3',num:3,phase:'Pre-Production',station:'GRAPHICS',title:'Graphics: Ideas, Approval & the Tracker',mat:'manual',
 blueprint:[
  {q:`When are graphics approved?`,opts:[`I approve ideas, then the team designs`,`After they are designed`,`Never, auto-add`]},
  {q:`What unlocks a push to ProPresenter?`,opts:[`Status Created + filename entered`,`Just approval`,`Nothing, it is automatic`]}
 ],
 lesson:`<p>Graphics are <b>separate</b> from lower thirds: designed visual assets (title cards, b-roll, screenshots). Flow: generate <b>ideas</b>, you <b>approve</b>, the design team picks them up on the <b>Graphics Tracker</b> (your monthly Google Sheet structure: Segment, Graphic #, Type, Description, Status, Assigned To, Notes; Show 1 to 5 tabs).</p>
 <p>Statuses run <b>Not Started, In Progress, Created, Loaded In</b>. When a row hits <b>Created and a filename is entered</b>, the file is pulled from the Videoedit server and a <b>Push to ProPresenter</b> action lights up. The page shows the script <b>side by side</b> with the spot each graphic appears highlighted (2 to 3 sentences of context), so interns know what a b-roll clip is for before sourcing from Storyblocks, Dreamstime, or Envato.</p>`,
 analogy:`The tracker is a kitchen ticket rail. A ticket (graphic idea) is approved and clipped up; a cook (Isaac, Jakob, Jeremiah) takes it, plates it (Created + filename), and only a plated dish reaches the pass (ProPresenter). No ticket, no plate; no plate, no pass.`,
 game:{type:'order',h:'Status flow',d:'Tap the four statuses in the order a graphic moves through them.',
   items:['Created','Not Started','Loaded In','In Progress'],correct:['Not Started','In Progress','Created','Loaded In']},
 quiz:[
  {q:`What is the gate to push a graphic to ProPresenter?`,o:[`Approval alone`,`Status Created with a filename entered`,`Nothing`],a:1,e:`Created + filename triggers the pull-from-folder and the push.`},
  {q:`Why the side-by-side script with the highlight?`,o:[`Decoration`,`So interns see what a b-roll clip is for before sourcing it`,`To edit the script`],a:1,e:`Context drives the right clip choice.`}
 ],
 decision:{question:`Lock the graphics flow.`,opts:[
   {id:'tracker',label:`Idea -> approve -> tracker (your sheet layout) -> Created+filename -> push`,tag:'recommended',rec:1,why:`Matches your live Google Sheet so interns do not relearn, with the Created gate protecting the push.`},
   {id:'auto',label:`Auto-generate and auto-push graphics`,tag:'risky',why:`Graphics are visual and human-made; keep approval and the Created gate.`}],
  specs:[[`Tracker`,`Segment|#|Type|Description|Status|Assigned|Notes; Show 1-5`],[`Statuses`,`Not Started, In Progress, Created, Loaded In`],[`Gate`,`Created + filename -> pull from Videoedit -> push`],[`Sources`,`Storyblocks, Dreamstime, Envato`]]},
 repo:`production_graphics is the tracker (distinct from lower thirds). Files on the Videoedit server, filename is the key. Side-by-side script highlight + source links are new UI.`,
 tell:`Build the Graphics page to mirror the monthly Google Sheet tracker (columns Segment, Graphic #, Type, Description, Status, Assigned To, Notes; Show 1-5 tabs; statuses Not Started, In Progress, Created, Loaded In; add the Book Cover type). Show the script side by side with each graphic's spot highlighted (2-3 sentences). On Created + filename, enable a human-triggered Push to ProPresenter that pulls the file from the Videoedit server by filename. Add Storyblocks/Dreamstime/Envato source links. Graphics are separate from lower thirds.`},

{id:'m4',num:4,phase:'Pre-Production',station:'RUNDOWN',title:'Rundown Build (Graphics to Rundown Creator)',mat:'manual',
 blueprint:[
  {q:`How does the rundown get updated?`,opts:[`Manual confirm with a preview first`,`Auto on every change`,`I do it by hand in RC`]},
  {q:`If there are more graphics than rundown rows?`,opts:[`Add rows automatically in the right place`,`Skip the extras`,`I add them by hand`]}
 ],
 lesson:`<p>Approved <b>graphics</b> (not lower thirds) are written into Rundown Creator. Each graphic gets <b>its own row</b>: the <b>Graphics</b> column gets the graphic, the <b>Last Line</b> column gets the final line before the next graphic, and <b>Notes</b> holds the duration in <b>sentences</b> until the next graphic. Both are computed from where each graphic sits in the script.</p>
 <p>Your rundowns for the year already exist with a default count of rows. The build is <b>fluid</b>: it deletes unused rows and inserts new ones in the right place to match the real graphic count, updating in place. You confirm with a <b>preview that mirrors the RC columns</b> before anything writes.</p>`,
 analogy:`Like setting a dinner table to the actual headcount. The table is pre-laid for ten; eight show up, you quietly clear two settings; twelve show up, you add two. You glance at the whole table (the preview) before guests sit.`,
 game:{type:'sort',h:'Which column?',d:'Where does each piece go in Rundown Creator?',
   binA:'Graphics column (1)',binB:'Last Line column (4)',
   items:[['The approved graphic','A'],['The last spoken line before the next graphic','B'],['B-roll: river canyon','A'],['The cut cue to switch graphics','B']]},
 quiz:[
  {q:`What goes in the Notes column for a graphic?`,o:[`The title`,`The duration in sentences until the next graphic`,`The assignee`],a:1,e:`Notes = sentence-duration, auto-computed from script position.`},
  {q:`Too many graphics for the default rows. The build...`,o:[`drops extras`,`inserts rows in the right place automatically`,`asks you each time`],a:1,e:`Fluid insert/delete keyed by segment + beat, update in place.`}
 ],
 decision:{question:`Lock the rundown push.`,opts:[
   {id:'preview',label:`Manual confirm via an RC-mirror preview; fluid insert/delete; update in place`,tag:'recommended',rec:1,why:`The TD runs from this, so you eyeball a column-accurate preview before any write, and rows reconcile to the real count automatically.`},
   {id:'auto',label:`Auto-write to RC on every change`,tag:'risky',why:`RC is flaky and feeds the TD; keep the preview + confirm.`}],
  specs:[[`Per graphic`,`own row: Graphics col 1, Last Line col 4, Notes = sentences`],[`Reconcile`,`insert/delete rows to match count, update in place`],[`Confirm`,`RC-mirror preview, then write`],[`API`,`insertRow/setRowProperties/deleteRow (RC write API)`]]},
 repo:`/api/rc-explore reads; the build adds a write path (insertRow, setRowProperties, deleteRow, reorderRows). RC returns errors as HTTP 200, so always read the body. Row codes B2..F8. NEEDS: Daniel to set up RC API access (key + token in 1Password).`,
 tell:`Build the rundown push as a manual-confirm action with a preview that mirrors the Rundown Creator columns. Write approved GRAPHICS only (never lower thirds): each graphic its own row, Graphics col 1 = the graphic, Last Line col 4 = the final line before the next graphic, Notes = sentence-duration, both computed from the script position. Reconcile rows fluidly (insertRow / deleteRow) to the real count, update in place keyed by segment+beat. Always read the JSON body (RC returns errors as HTTP 200). Needs RC API key + token from 1Password.`},

{id:'m5',num:5,phase:'Live',station:'PROPRES',title:'ProPresenter Load (the Read-Only Line)',mat:'manual',

 <p>The system <b>surfaces a ready signal and a human does the load</b>. No automation commands the production machine until you approve a tested path. Mapping each item to the right slide and position is real work you will define at your computer.</p>`,
 analogy:`The dashboard is the on-deck circle, not the batter's box. It tells the loader exactly what is ready and where it goes; a person steps up and swings. The machine on air is never swung for it.`,
 game:{type:'sort',h:'Clear to load?',d:'Which of these is cleared to push to ProPresenter?',

 ],
 decision:{question:`Lock the ProPresenter posture.`,opts:[
   {id:'signal',label:`System signals ready (on Created+filename); human loads; mapping defined later`,tag:'recommended',rec:1,why:`Captures the value while keeping the on-air machine human-operated.`},
   {id:'autopush',label:`Auto-push to the live machine`,tag:'off-limits',why:`Against the David Rule until David approves a tested path.`}],
  specs:[[`Gate`,`Created + filename`],[`Presentations`,`lower thirds and graphics separate`],[`Templates`,`monthly 5x show playlists`],[`Push`,`human-triggered; mapping is a Daniel TODO at his computer`]]},
 repo:`ProPresenter (GSN-PropRes) is off-limits to automation. Mapping to slide/presentation/playlist is deferred (needs Daniel at his computer).`,
 tell:`Do not command the production ProPresenter from automation. Surface a "ready to load" signal once a graphic is Created with a filename; a human loads it. Lower thirds and graphics map to separate presentations within the monthly 5x show playlist templates. Hold the slide/position mapping until Daniel defines it at his computer.`},

{id:'m7',num:7,phase:'Post-Production',station:'TRANSCRIBE',title:'Transcription (Local, with Speakers)',mat:'manual',

 <p><b>Speaker differentiation matters</b> (it drives metadata, data, and social), but through <b>one tool</b>, not a service per speaker: <b>WhisperKit + SpeakerKit</b> (Mac-native) produces a speaker-labeled transcript plus captions, written to Supabase.</p>`,

 quiz:[
  {q:`Why not have the team drop an audio file in Dropbox?`,o:[`It is fine`,`It clutters Dropbox and adds a step; extract locally instead`,`Dropbox cannot hold audio`],a:1,e:`Local auto-extraction keeps it clean and effortless.`},
  {q:`How do you get speaker labels without a separate service?`,o:[`Two tools`,`One tool: WhisperKit + SpeakerKit`,`You cannot`],a:1,e:`A single Mac-native pipeline does transcript + diarization.`}
 ],
 decision:{question:`Lock transcription.`,opts:[
   {id:'localdiar',label:`Local auto-extract + WhisperKit/SpeakerKit (speaker-labeled)`,tag:'recommended',rec:1,why:`Zero new work for the team, one tool, speaker labels included.`},
   {id:'plain',label:`Cloud Whisper, no speaker labels`,tag:'limited',why:`Loses the diarization you need for social and data.`}],
  specs:[[`Audio`,`local Automator/Hazel/fswatch extract (no Dropbox)`],[`Engine`,`WhisperKit + SpeakerKit, speaker-labeled`],[`Output`,`transcript + SRT/VTT to Supabase`]]},
 repo:`Future post phase. Local Mac job (not the NAS). Hedge: WhisperKit 2.2% WER is a vendor number; sanity-check diarization on a real two-person interview.`,
 tell:`Build transcription with a LOCAL Mac automation (Automator Folder Action / Hazel / fswatch) on the editor's master export folder: ffmpeg extracts a small ~16kHz audio file locally (no Dropbox), then WhisperKit + SpeakerKit transcribes WITH speaker labels, writing transcript + SRT/VTT to Supabase. One tool, not a service per speaker. Local only, never the NAS.`},

 ],

/* cross-module carryover: later modules reflect earlier choices */
function pick(mid,qi){const a=(S.intake[mid]||{})[qi];return a||null;}
function carryover(m){
 const out=[];
 if(m.id==='m8'){const t=pick('m1',0);if(t)out.push('From Intake, scripts arrive by: <b>'+t+'</b>. Metadata pulls episode fields from those.');}
 if(m.id==='m9'){const t=pick('m9',1);const sp=pick('m9',2);
   if(t)out.push('Targets first: <b>'+t+'</b>.');if(sp)out.push('Pace to auto: <b>'+sp+'</b>.');
   const d0=(S.decisions['m0']);if(d0==='fast')out.push('You picked an aggressive pace in Ground Rules, but distribution still ships manual-trigger first for safety.');}
 if(m.id==='m4'){const g=S.decisions['m3'];if(g)out.push('Graphics flow is locked, so the rundown pulls those approved graphics.');}
 if(m.id==='m5'){const g=S.decisions['m3'];if(g)out.push('Only graphics marked Created with a filename (from Module 3) become loadable here.');}
 if(m.id==='m2'){const i=S.decisions['m1'];if(i)out.push('Intake is locked, so the lower-thirds file you upload feeds this page.');}
 if(!out.length)return '';
 return '<div class="carry"><b>Carryover from your earlier choices.</b> '+out.join(' ')+'</div>';
}

/* ===================== state ===================== */
function fresh(){return{module:0,tab:'blueprint',intake:{},quiz:{},games:{},decisions:{},seen:{}};}
function load(){try{const r=store.get(KEY);if(r)return JSON.parse(r);}catch(e){}return null;}
let S=load()||fresh();
function save(){try{store.set(KEY,JSON.stringify(S));}catch(e){}}
const FIN=M.length;
const $=id=>document.getElementById(id);
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function decided(){return M.filter(m=>S.decisions[m.id]).length;}
function gi(id){return S.intake[id]||(S.intake[id]={});}
function gq(id){return S.quiz[id]||(S.quiz[id]={});}
function toast(t){const e=$('toast');e.textContent=t;e.classList.add('show');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('show'),2400);}
function confetti(x,y){const c=['#2563eb','#5cf2a0','#b8860b','#7c3aed','#1d8a52'];for(let i=0;i<22;i++){const s=document.createElement('div');s.className='spark';s.style.left=x+'px';s.style.top=y+'px';s.style.background=c[i%c.length];document.body.appendChild(s);const a=Math.random()*6.28,d=35+Math.random()*80;s.animate([{transform:'translate(0,0) scale(1)',opacity:1},{transform:'translate('+Math.cos(a)*d+'px,'+(Math.sin(a)*d-25)+'px) scale(0)',opacity:0}],{duration:600+Math.random()*400,easing:'cubic-bezier(.2,.7,.3,1)'});setTimeout(()=>s.remove(),1100);}}
function copyText(t){try{navigator.clipboard.writeText(t);}catch(e){const a=document.createElement('textarea');a.value=t;document.body.appendChild(a);a.select();try{document.execCommand('copy');}catch(e2){}a.remove();}}
function download(n,t,ty){const b=new Blob([t],{type:ty||'text/plain;charset=utf-8'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=n;document.body.appendChild(a);a.click();setTimeout(()=>{a.remove();URL.revokeObjectURL(u);},120);}

/* ===================== rail ===================== */
function renderRail(){
 const host=$('modList');host.innerHTML='';let lastPhase='';
 M.forEach((m,i)=>{
  if(m.phase!==lastPhase){const h=document.createElement('div');h.className='phasehdr';h.textContent=m.phase;host.appendChild(h);lastPhase=m.phase;}
  const b=document.createElement('div');b.className='mod'+(i===S.module?' cur':'')+(S.decisions[m.id]?' done':'');
  b.innerHTML='<span class="dot"></span><span class="t">'+esc(m.title)+'<div class="ph">'+esc(m.station)+'</div></span><span class="n">'+m.num+'</span>';
  b.onclick=()=>{S.module=i;S.tab='blueprint';save();render();window.scrollTo(0,0);};host.appendChild(b);
 });
 const fb=document.createElement('div');fb.className='mod'+(S.module===FIN?' cur':'')+(decided()===M.length?' done':'');
 fb.innerHTML='<span class="dot"></span><span class="t">Finale &amp; Build Plan</span><span class="n">&#9873;</span>';
 fb.onclick=()=>{S.module=FIN;save();render();};host.appendChild(fb);
 const bsf=$('bsf');const d=M.filter(m=>S.decisions[m.id]);
 bsf.innerHTML=d.length?d.map(m=>{const o=m.decision.opts.find(o=>o.id===S.decisions[m.id]);return '<div class="bsf"><b>M'+m.num+'</b> '+esc(o?o.label:'')+'</div>';}).join(''):'<div class="bsf" style="opacity:.6">Lock a decision in each module and it appears here.</div>';
 $('storeMode').textContent='Saved in: '+store.mode+' . Use Save to export course-state.json';
}

/* ===================== flow strip ===================== */
function flow(){const w=document.createElement('div');w.className='flow';
 M.forEach((m,i)=>{const b=document.createElement('span');b.className='sbox'+(S.decisions[m.id]?' on':'')+(i===S.module?' cur':'');b.textContent=m.num+' '+m.station;w.appendChild(b);
  if(i<M.length-1){const a=document.createElement('span');a.className='sar';a.textContent='→';w.appendChild(a);}});
 const a=document.createElement('span');a.className='sar';a.textContent='→';w.appendChild(a);
 const f=document.createElement('span');f.className='sbox'+(decided()===M.length?' on':'')+(S.module===FIN?' cur':'');f.textContent='⚑ PLAN';w.appendChild(f);return w;}

/* ===================== render ===================== */
function render(){
 const done=decided();$('xpDone').textContent=done;$('xpTotal').textContent=M.length;$('xpFill').style.width=Math.round(done/M.length*100)+'%';
 const main=$('main');main.innerHTML='';main.appendChild(flow());
 if(S.module===FIN){$('phaseTag').textContent='Finale';main.appendChild(finale());renderRail();return;}
 const m=M[S.module];$('phaseTag').textContent=m.phase;main.appendChild(moduleCard(m));renderRail();
}
const MAT={manual:['mat-manual','Manual first'],handoff:['mat-handoff','Prompt handoff first'],auto:['mat-auto','Auto'],priority:['mat-priority','Priority build']};
function moduleCard(m){
 const c=document.createElement('div');c.className='card';
 const quizDone=Object.keys(gq(m.id)).length>=m.quiz.length;const dec=!!S.decisions[m.id];
 let h='<span class="kick">Module '+m.num+' · '+esc(m.phase)+'</span>';
 h+='<h2>'+esc(m.title)+(m.mat&&MAT[m.mat]?'<span class="maturity '+MAT[m.mat][0]+'">'+MAT[m.mat][1]+'</span>':'')+'</h2>';
 h+='<div class="tabs">'+tab('1 · Blueprint','blueprint')+tab('2 · Learn + Play','learn',quizDone?'✓':'')+tab('3 · Decide','decide',dec?'✓':'')+'</div><div id="body"></div>';
 h+='<div class="nav"><button class="btn ghost" id="prev">← Previous</button><button class="btn ghost" id="ask">Ask the Consultant</button><button class="btn" id="next">Next →</button></div>';
 c.innerHTML=h;
 c.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{S.tab=b.dataset.t;save();render();});
 c.querySelector('#prev').onclick=()=>{if(S.module>0){S.module--;S.tab='blueprint';save();render();}};
 c.querySelector('#next').onclick=()=>{S.module=Math.min(FIN,S.module+1);S.tab='blueprint';save();render();};
 c.querySelector('#ask').onclick=e=>{consult(m);confetti(e.clientX,e.clientY);};
 const body=c.querySelector('#body');
 body.appendChild(S.tab==='blueprint'?blueprint(m):S.tab==='learn'?learn(m):decide(m));
 return c;
}
function tab(l,k,mk){return '<button class="tab'+(S.tab===k?' on':'')+'" data-t="'+k+'">'+l+(mk?'<span class="mk">'+mk+'</span>':'')+'</button>';}

/* tab 1: blueprint (multiple choice) */
function blueprint(m){const d=document.createElement('div');
 let h='<div class="note">First, your blueprint. Tap your answer; it shapes the build plan and what later modules say.</div>';
 const cur=gi(m.id);
 m.blueprint.forEach((q,i)=>{h+='<div class="bq"><div class="q">'+esc(q.q)+'</div><div class="opts" data-q="'+i+'">';
  q.opts.forEach(o=>{h+='<button class="opt'+(cur[i]===o?' sel':'')+'" data-v="'+esc(o)+'">'+esc(o)+'</button>';});h+='</div></div>';});
 d.innerHTML=h;
 d.querySelectorAll('.opts').forEach(row=>{const qi=+row.dataset.q;row.querySelectorAll('.opt').forEach(b=>b.onclick=()=>{gi(m.id)[qi]=b.dataset.v;save();row.querySelectorAll('.opt').forEach(x=>x.classList.toggle('sel',x.dataset.v===gi(m.id)[qi]));});});
 return d;
}

/* tab 2: learn + game + quiz */
function learn(m){const d=document.createElement('div');
 let h=carryover(m);
 h+='<div class="lesson">'+m.lesson+'</div><div class="analogy"><b>Analogy.</b> '+esc(m.analogy)+'</div>';
 d.innerHTML=h;
 d.appendChild(game(m));
 const qh=document.createElement('div');let q='<div class="h3">Quick check</div>';const qz=gq(m.id);
 m.quiz.forEach((it,qi)=>{q+='<div class="q"><div class="qt">'+(qi+1)+'. '+esc(it.q)+'</div><div class="qo" data-q="'+qi+'">';
  it.o.forEach((o,oi)=>{let cls='qopt';if(qi in qz){if(oi===it.a)cls+=' correct';else if(oi===qz[qi])cls+=' wrong';}q+='<button class="'+cls+'" data-o="'+oi+'">'+esc(o)+'</button>';});
  q+='</div><div class="qexpl'+((qi in qz)?' show':'')+'">'+(qi in qz?(qz[qi]===it.a?'✓ ':'✕ ')+esc(it.e):'')+'</div></div>';});
 qh.innerHTML=q;
 qh.querySelectorAll('.qo').forEach(row=>{const qi=+row.dataset.q;row.querySelectorAll('.qopt').forEach(b=>b.onclick=e=>{if(qi in gq(m.id))return;gq(m.id)[qi]=+b.dataset.o;save();if(+b.dataset.o===m.quiz[qi].a)confetti(e.clientX,e.clientY);render();});});
 d.appendChild(qh);
 return d;
}

/* ===================== games ===================== */
function game(m){const g=m.game;const d=document.createElement('div');d.className='game';
 d.innerHTML='<div class="gh">▶ '+esc(g.h)+'</div><div class="gd">'+esc(g.d)+'</div>';
 const st=S.games[m.id]||(S.games[m.id]={});
 if(g.type==='sort'){
  const pool=document.createElement('div');pool.className='pool';
  const binwrap=document.createElement('div');binwrap.className='bins';
  const ba=document.createElement('div');ba.className='bin';ba.innerHTML='<h4>'+esc(g.binA)+'</h4><div class="bd"></div>';
  const bb=document.createElement('div');bb.className='bin';bb.innerHTML='<h4>'+esc(g.binB)+'</h4><div class="bd"></div>';
  binwrap.appendChild(ba);binwrap.appendChild(bb);
  function draw(){pool.innerHTML='';ba.querySelector('.bd').innerHTML='';bb.querySelector('.bd').innerHTML='';
   g.items.forEach((it,idx)=>{const placed=st[idx];const chip=document.createElement('span');chip.className='chip'+(placed?(placed===it[1]?' good':' bad'):'');chip.textContent=it[0];
    chip.onclick=()=>{st[idx]=st[idx]==='A'?'B':(st[idx]==='B'?null:'A');save();draw();chk();};
    (placed==='A'?ba:placed==='B'?bb:pool).querySelector?null:0;
    if(placed==='A')ba.querySelector('.bd').appendChild(chip);else if(placed==='B')bb.querySelector('.bd').appendChild(chip);else pool.appendChild(chip);});}
  const feed=document.createElement('div');feed.className='gfeed';
  function chk(){const all=g.items.every((it,idx)=>st[idx]===it[1]);const any=g.items.some((it,idx)=>st[idx]);feed.className='gfeed '+(all?'ok':'no');feed.textContent=all?'✓ All sorted correctly.':any?'Keep going (tap a chip to move it).':'';if(all)confetti(innerWidth/2,260);}
  d.appendChild(pool);d.appendChild(binwrap);d.appendChild(feed);draw();chk();
  const hint=document.createElement('div');hint.className='gd';hint.style.marginTop='6px';hint.textContent='Tap a chip to send it to bin 1, again for bin 2, again to reset.';d.appendChild(hint);
 }
 else if(g.type==='order'){
  const list=document.createElement('div');list.className='orderlist';const feed=document.createElement('div');feed.className='gfeed';
  st.seq=st.seq||[];
  function draw(){list.innerHTML='';g.items.forEach(it=>{const pos=st.seq.indexOf(it);const row=document.createElement('div');row.className='ordit'+(pos>=0?' picked':'');row.innerHTML='<span class="seq">'+(pos>=0?pos+1:'')+'</span>'+esc(it);
    row.onclick=()=>{const p=st.seq.indexOf(it);if(p>=0)st.seq.splice(p,1);else st.seq.push(it);save();draw();chk();};list.appendChild(row);});}
  function chk(){if(st.seq.length<g.items.length){feed.className='gfeed';feed.textContent='Tap in order ('+st.seq.length+'/'+g.items.length+').';return;}const ok=st.seq.every((x,i)=>x===g.correct[i]);feed.className='gfeed '+(ok?'ok':'no');feed.textContent=ok?'✓ Correct order.':'Not quite, tap to clear and retry.';if(ok)confetti(innerWidth/2,260);else{st.seq=[];save();}}
  d.appendChild(list);d.appendChild(feed);draw();chk();
 }
 else if(g.type==='trim'){
  const feed=document.createElement('div');feed.className='gfeed';
  g.options.forEach((o,idx)=>{const row=document.createElement('div');row.className='trimrow'+(st.pick===idx?' pick':'');const cc=o[1]>65?'bad':o[1]<55?'warn':'good';
   row.innerHTML=esc(o[0])+'<span class="cc '+cc+'">'+o[1]+'</span>';
   row.onclick=()=>{st.pick=idx;save();d.querySelectorAll('.trimrow').forEach((r,i)=>r.classList.toggle('pick',i===idx));feed.className='gfeed '+(o[2]?'ok':'no');feed.textContent=o[2]?'✓ In band, ALL CAPS, clean punctuation.':(o[1]>65?'Over 65, too long.':o[1]<55?'Under 55 and not ALL CAPS.':'Has banned punctuation (comma / dashes).');if(o[2])confetti(innerWidth/2,260);};
   d.appendChild(row);});
  d.appendChild(feed);
 }
 else if(g.type==='dial'){
  st.r=st.r||{};const feed=document.createElement('div');feed.className='gfeed';
  g.rows.forEach((r,idx)=>{const row=document.createElement('div');row.className='bq';row.innerHTML='<div class="q">'+esc(r[0])+'</div>';
   const opts=document.createElement('div');opts.className='opts';
   [r[1],'Fully auto immediately','Skip it'].forEach(opt=>{const b=document.createElement('button');b.className='opt'+(st.r[idx]===opt?' sel':'');b.textContent=opt;b.onclick=()=>{st.r[idx]=opt;save();opts.querySelectorAll('.opt').forEach(x=>x.classList.toggle('sel',x.textContent===opt));chk();};opts.appendChild(b);});
   row.appendChild(opts);d.appendChild(row);});
  function chk(){const all=g.rows.every((r,idx)=>st.r[idx]===r[2]);feed.className='gfeed '+(all?'ok':'no');feed.textContent=all?'✓ Right first move for every platform.':'Pick the safe first move for each (hint: nothing goes full-auto on day one).';if(all)confetti(innerWidth/2,260);}
  d.appendChild(feed);chk();
 }
 return d;
}

/* tab 3: decide */
function decide(m){const d=document.createElement('div');const dec=m.decision;const ch=S.decisions[m.id];
 let h='<div class="note">Lock the decision. It becomes a build record in your exported plan, with a ready-to-paste instruction for Claude.</div>';
 h+='<div class="bq"><div class="q">'+esc(dec.question)+'</div><div class="opts">';
 dec.opts.forEach(o=>{h+='<button class="opt'+(ch===o.id?' sel':'')+'" data-id="'+o.id+'"><span class="tag'+(o.rec?' rec':'')+'">'+esc(o.tag)+'</span>'+esc(o.label)+'<div class="why">'+esc(o.why)+'</div></button>';});
 h+='</div></div>';
 h+='<div class="h3">Locked spec</div><table class="tinytable"><tbody>'+dec.specs.map(s=>'<tr><td>'+esc(s[0])+'</td><td>'+esc(s[1])+'</td></tr>').join('')+'</tbody></table>';
 h+='<details><summary>Repo cross-check</summary><div class="note" style="margin-top:8px">'+esc(m.repo)+'</div></details>';
 h+='<div class="tell"><b>Tell Claude</b> (copy into your build session).<code>'+esc(m.tell)+'</code><button class="btn ghost" id="cp" style="margin-top:8px">Copy instruction</button></div>';
 d.innerHTML=h;
 d.querySelectorAll('.opt').forEach(b=>b.onclick=e=>{S.decisions[m.id]=b.dataset.id;S.seen[m.id]=1;save();confetti(e.clientX,e.clientY);toast('Locked Module '+m.num+'.');render();});
 d.querySelector('#cp').onclick=()=>{copyText(m.tell);toast('Instruction copied.');};
 return d;
}

/* consultant */
function consult(m){const cur=gi(m.id);const L=[];
 L.push('I am working on GSR Automation v2, Module '+m.num+': '+m.title+' (phase: '+m.phase+').');
 L.push('Target repo: gsr-automation-v2, built locally via Claude Code. Honor the David Rule (cloud APIs + DB only).');
 L.push('');L.push('My blueprint answers:');
 m.blueprint.forEach((q,i)=>L.push('- '+q.q+' => '+(cur[i]||'(blank)')));
 const o=S.decisions[m.id]?m.decision.opts.find(x=>x.id===S.decisions[m.id]):null;
 L.push('');L.push('Decision so far: '+(o?o.label:'not yet decided'));
 L.push('');L.push('My question for you as my standing technical consultant: ');
 copyText(L.join('\n'));toast('Consultant prompt copied. Paste it into Claude and add your question.');
}

/* build plan export (MD + HTML) */
const XMOVES=['Clear the YouTube/Google API audit (only Daniel; unlocks public auto-publish).','Set up Rundown Creator API access (APIKey + APIToken in 1Password).','Define the ProPresenter slide/presentation/playlist mapping at the computer.','Run the first real-episode lower-thirds import (graphics table is still 0 rows).'];
function planMD(){const now=new Date().toISOString().slice(0,10);const L=[];
 L.push('# GSR Automation v2 - Build Plan');L.push('');L.push('_Generated '+now+'. Target repo: **gsr-automation-v2**. Decisions locked: '+decided()+' / '+M.length+'._');L.push('');
 L.push('## How to run');L.push('Open Claude Code in gsr-automation-v2. Work module by module in order. Paste each module Tell-Claude prompt, review the draft PR, confirm tsc + eslint, squash-merge.');L.push('');
 L.push('## The David Rule');L.push('Automation reads cloud APIs and writes the database only. Never the live broadcast chain, ProPresenter, ATEM, Companion, QNAP, or Tailscale.');L.push('');
 M.forEach(m=>{const cur=S.intake[m.id]||{};const o=m.decision.opts.find(o=>o.id===S.decisions[m.id]);
  L.push('## M'+m.num+' - '+m.title+'  ('+m.phase+(m.mat?', '+(MAT[m.mat]?MAT[m.mat][1]:m.mat):'')+')');L.push('');
  L.push('**Your intent**');m.blueprint.forEach((q,i)=>L.push('- '+q.q+' => '+(cur[i]||'(blank)')));L.push('');
  L.push('**Locked decision:** '+(o?o.label:'NOT YET DECIDED'));if(o){L.push('');L.push('Why: '+o.why);}L.push('');
  L.push('**Spec**');m.decision.specs.forEach(s=>L.push('- '+s[0]+': '+s[1]));L.push('');
  L.push('**Repo:** '+m.repo);L.push('');L.push('**Tell Claude:**');L.push('```');L.push(m.tell);L.push('```');L.push('');});
 const und=M.filter(m=>!S.decisions[m.id]);L.push('## Open decisions');if(und.length)und.forEach(m=>L.push('- M'+m.num+' '+m.title));else L.push('- None, all locked.');L.push('');
 L.push('## Cross-cutting TODOs (Daniel)');XMOVES.forEach(x=>L.push('- '+x));L.push('');
 L.push('_End. Build in gsr-automation-v2. Pull before you start, push when you stop._');return L.join('\n');}
function planHTML(){const now=new Date().toISOString().slice(0,10);const H=[];
 H.push('<!doctype html><meta charset="utf-8"><title>GSR Build Plan</title><style>body{max-width:880px;margin:0 auto;padding:30px 20px;font:15px/1.6 -apple-system,Segoe UI,sans-serif;color:#16202e}h1{font-size:24px}h2{margin-top:26px;border-top:1px solid #e1e8f1;padding-top:12px}pre{background:#0d1320;color:#dce7f5;padding:13px;border-radius:8px;white-space:pre-wrap;font:13px ui-monospace,Menlo,monospace}table{border-collapse:collapse}td{border:1px solid #e1e8f1;padding:4px 8px;font-size:14px}td:first-child{font-weight:600;color:#2563eb}.law{background:#fff6e9;border:1px solid #f0d8a8;padding:12px;border-radius:8px}</style>');
 H.push('<h1>GSR Automation v2 - Build Plan</h1><p>Generated '+now+'. Target repo: <b>gsr-automation-v2</b>. Decisions locked: '+decided()+' / '+M.length+'.</p>');
 H.push('<div class="law"><b>The David Rule.</b> Automation reads cloud APIs and writes the database only; never the live broadcast chain, ProPresenter, ATEM, Companion, QNAP, or Tailscale.</div>');
 M.forEach(m=>{const cur=S.intake[m.id]||{};const o=m.decision.opts.find(o=>o.id===S.decisions[m.id]);
  H.push('<h2>M'+m.num+' - '+esc(m.title)+'</h2><p><i>'+esc(m.phase)+(m.mat&&MAT[m.mat]?' . '+MAT[m.mat][1]:'')+'</i></p>');
  H.push('<p><b>Your intent</b></p><ul>'+m.blueprint.map((q,i)=>'<li>'+esc(q.q)+' &rArr; '+esc(cur[i]||'(blank)')+'</li>').join('')+'</ul>');
  H.push('<p><b>Locked decision:</b> '+(o?esc(o.label):'NOT YET DECIDED')+'</p>'+(o?'<p style="color:#5c6b7e">'+esc(o.why)+'</p>':''));
  H.push('<p><b>Spec</b></p><table><tbody>'+m.decision.specs.map(s=>'<tr><td>'+esc(s[0])+'</td><td>'+esc(s[1])+'</td></tr>').join('')+'</tbody></table>');
  H.push('<p style="color:#5c6b7e"><b>Repo:</b> '+esc(m.repo)+'</p><p><b>Tell Claude</b></p><pre>'+esc(m.tell)+'</pre>');});
 H.push('<h2>Cross-cutting TODOs</h2><ul>'+XMOVES.map(x=>'<li>'+esc(x)+'</li>').join('')+'</ul>');
 return H.join('\n');}
function buildPlan(){const now=new Date().toISOString().slice(0,10);download('GSR-Build-Plan-'+now+'.md',planMD(),'text/markdown');setTimeout(()=>download('GSR-Build-Plan-'+now+'.html',planHTML(),'text/html'),300);toast('Build plan exported: MD + HTML.');}

/* finale */
function finale(){const d=document.createElement('div');d.className='card fin';const done=decided();
 let h='<span class="kick">Finale</span><h2>Power-on inspection</h2><p style="color:var(--dim)">Every locked decision is a build record. Export the plan and hand it to Claude Code.</p>';
 h+='<div class="note"><b>'+done+' / '+M.length+'</b> decisions locked.</div>';
 M.forEach(m=>{const o=m.decision.opts.find(o=>o.id===S.decisions[m.id]);h+='<div class="chk"><span class="bx'+(S.decisions[m.id]?' on':'')+'"></span><span><b>M'+m.num+'</b> '+esc(m.title)+(o?' &mdash; '+esc(o.label):' &mdash; not yet decided')+'</span></div>';});
 h+='<h3>Save + export</h3><div class="note">Click <b>Save</b> (top) to download <b>course-state.json</b>; commit it to docs/_handoff/ and Load it to resume on any device. One cumulative state, no separate files.</div>';
 h+='<div style="display:flex;gap:8px;flex-wrap:wrap;margin:8px 0"><button class="btn" id="fp">Export Build Plan (MD + HTML)</button></div>';
 h+='<h3>Cross-cutting TODOs</h3><div class="note">'+XMOVES.map(x=>'• '+esc(x)).join('<br>')+'</div>';
 h+='<div class="nav"><button class="btn ghost" id="bk">← Back to modules</button><span></span></div>';
 d.innerHTML=h;d.querySelector('#fp').onclick=()=>buildPlan();d.querySelector('#bk').onclick=()=>{S.module=Math.max(0,M.length-1);save();render();};
 return d;
}

/* JSON + boot */
function exportJSON(){download('course-state.json',JSON.stringify(S,null,2),'application/json');toast('Saved as course-state.json. Commit to docs/_handoff/ and Load to resume.');}
function importJSON(f){const r=new FileReader();r.onload=()=>{try{const o=JSON.parse(r.result);if(o&&typeof o==='object'){S=Object.assign(fresh(),o);if(typeof S.module!=='number')S.module=0;save();render();toast('State loaded.');}}catch(e){toast('Could not read that file.');}};r.readAsText(f);}
$('btnPlan').onclick=()=>buildPlan();$('btnJson').onclick=()=>exportJSON();$('btnImport').onclick=()=>$('fileImport').click();
$('fileImport').onchange=e=>{if(e.target.files[0])importJSON(e.target.files[0]);e.target.value='';};
$('btnReset').onclick=()=>{if(confirm('Reset all progress and decisions?')){S=fresh();save();render();}};
render();
</script>
</body>
</html>
