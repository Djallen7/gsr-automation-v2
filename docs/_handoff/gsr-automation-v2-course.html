<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>GSR Automation v2 // Design Your Own System</title>
<style>
:root{
 --bg:#eef2f8;--panel:#ffffff;--ink:#16202e;--dim:#5c6b7e;--line:#e1e8f1;--line2:#eef2f7;
 --accent:#2563eb;--accentsoft:#e9f1ff;--accent2:#7c3aed;
 --good:#1d8a52;--good-bg:#e6f6ec;--warn:#b7791f;--warn-bg:#fdf3e2;--bad:#c0392b;--bad-bg:#fdecea;
 --gold:#b8860b;--gold-bg:#fbf6ea;
 --shadow:0 1px 3px rgba(16,32,55,.07),0 6px 20px -10px rgba(16,32,55,.18);
 --node:#f6f9fd;--nodeink:#5c6b7e;--track:#dbe4f0;
 --rad:14px;--tap:44px;
}
[data-theme="dark"]{
 --bg:#0b1220;--panel:#121c2e;--ink:#e7eefb;--dim:#9fb0c8;--line:#22324c;--line2:#1a2740;
 --accent:#5b9bff;--accentsoft:#16294a;--accent2:#a679f0;
 --good:#4cc486;--good-bg:#11321f;--warn:#e0a94e;--warn-bg:#34280f;--bad:#f0726a;--bad-bg:#3a1716;
 --gold:#d9ad4a;--gold-bg:#2a2410;
 --shadow:0 1px 3px rgba(0,0,0,.4),0 8px 26px -12px rgba(0,0,0,.6);
 --node:#16243c;--nodeink:#9fb0c8;--track:#243652;
}
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--bg);color:var(--ink);font:clamp(14px,1.4vw,15px)/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-text-size-adjust:100%}
button{font-family:inherit}
.app{display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:0;min-height:100vh}
@media(max-width:1040px){.app{grid-template-columns:1fr}}
header.top{grid-column:1/-1;background:linear-gradient(100deg,#0b1422,#15233c);color:#eaf1ff;padding:10px clamp(12px,3vw,22px);display:flex;gap:12px;align-items:center;flex-wrap:wrap;position:sticky;top:0;z-index:30;box-shadow:var(--shadow)}
header h1{font-size:clamp(13px,2vw,15px);margin:0;font-weight:600;letter-spacing:.01em}
header h1 b{color:#7fb0ff}
.badge{font-size:11px;background:#13243f;color:#9fc1ff;border:1px solid #284a78;border-radius:999px;padding:2px 9px}
.htools{margin-left:auto;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.tbtn{background:#16294a;color:#dce9fb;border:1px solid #2a4a78;border-radius:9px;padding:8px 11px;font-size:12px;cursor:pointer;min-height:var(--tap)}
.tbtn:hover{background:#1e3a63}
.tbtn:focus-visible{outline:2px solid #7fb0ff;outline-offset:2px}
.tbtn.primary{background:#2563eb;border-color:#2563eb;color:#fff}
main{padding:clamp(12px,2.5vw,22px);max-width:920px;width:100%;margin:0 auto;padding-bottom:96px}
@media(max-width:1040px){main{padding-bottom:104px}}

/* ===== right rail: pipeline + build spec ===== */
.rail{background:var(--panel);border-left:1px solid var(--line);position:sticky;top:50px;height:calc(100vh - 50px);overflow:auto;padding:14px}
@media(max-width:1040px){.rail{position:static;height:auto;border-left:0;border-top:1px solid var(--line);display:none}.rail.open{display:block}}
.rail h2{font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:var(--dim);margin:2px 0 8px}
.pipewrap{border:1px solid var(--line);border-radius:12px;background:var(--bg);padding:8px}
svg.pipe{width:100%;height:auto;display:block;touch-action:manipulation}
.payload{margin-top:8px;font-size:11.5px;color:var(--dim);min-height:34px}
.payload b{color:var(--good)}
.buildspec{margin-top:14px}
.bs-row{display:flex;gap:8px;align-items:flex-start;font-size:12px;padding:6px 8px;border:1px solid var(--line);border-radius:9px;margin:4px 0;background:var(--bg)}
.bs-row .nn{font:700 10px ui-monospace,monospace;color:var(--dim);min-width:24px}
.bs-row.locked{border-color:var(--good);background:var(--good-bg)}
.bs-row .lab{flex:1;min-width:0}
.bs-row .lab small{display:block;color:var(--dim);font-size:10.5px;margin-top:2px}
.bs-empty{font-size:12px;color:var(--dim);opacity:.8;padding:6px 2px}
.storemode{font-size:10.5px;color:var(--dim);opacity:.7;margin-top:10px}

/* ===== progress segmented bar ===== */
.prog{display:flex;gap:3px;margin:0 0 4px}
.prog .seg{height:6px;flex:1;border-radius:3px;background:var(--track)}
.prog .seg.on{background:var(--accent)}
.prog .seg.cur{background:var(--accent2)}

/* ===== card / module ===== */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--rad);padding:clamp(15px,3vw,22px);box-shadow:var(--shadow);margin-bottom:14px}
.kick{display:inline-block;font-size:11px;text-transform:uppercase;letter-spacing:.16em;color:var(--accent);background:var(--accentsoft);border:1px solid var(--line);border-radius:999px;padding:3px 11px}
.card h2{margin:9px 0 2px;font-size:clamp(19px,3.5vw,24px);line-height:1.2}
.subtitle{color:var(--dim);font-size:13.5px;margin:2px 0 0}
.maturity{display:inline-block;font-size:11px;border-radius:999px;padding:2px 9px;margin-left:6px;border:1px solid;vertical-align:middle}
.mat-manual{background:var(--bg);border-color:var(--line);color:var(--dim)}
.mat-handoff{background:var(--accentsoft);border-color:var(--line);color:var(--accent2)}
.mat-auto{background:var(--good-bg);border-color:var(--line);color:var(--good)}
.mat-priority{background:var(--warn-bg);border-color:var(--line);color:var(--warn)}
.steps{display:flex;gap:5px;margin:16px 0 6px;flex-wrap:wrap}
.step{border:1px solid var(--line);background:var(--bg);color:var(--dim);border-radius:999px;padding:8px 13px;font-size:12.5px;cursor:pointer;min-height:var(--tap);display:inline-flex;align-items:center;gap:5px}
.step.on{border-color:var(--accent);background:var(--accentsoft);color:var(--accent);font-weight:600}
.step .mk{color:var(--good)}
.step:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

.note{background:var(--accentsoft);border:1px solid var(--line);border-radius:10px;padding:11px 13px;margin:10px 0;font-size:13px}
.note.warn{background:var(--bad-bg);border-color:var(--line)}.note.warn b{color:var(--bad)}
.note.good{background:var(--good-bg)}
.carry{background:var(--accentsoft);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:9px;padding:10px 12px;margin:10px 0;font-size:13px}
.carry b{color:var(--accent)}
.reinforce{border-left:3px solid var(--warn)}
.reinforce b{color:var(--warn)}
.lesson p{margin:9px 0}
.lesson b{color:var(--ink)}
.lesson code,code.inl{background:var(--line2);border:1px solid var(--line);border-radius:5px;padding:1px 5px;font:12.5px ui-monospace,Menlo,monospace}
.analogy{border-left:3px solid var(--gold);background:var(--gold-bg);border-radius:9px;padding:11px 13px;margin:11px 0;color:var(--ink);font-size:13.5px}
.analogy b{color:var(--gold)}
details{border:1px solid var(--line);border-radius:9px;padding:9px 13px;background:var(--bg);margin:9px 0}
summary{cursor:pointer;color:var(--accent);font-size:13px;font-weight:600;min-height:24px}
details[open] summary{margin-bottom:6px}

/* predict / decision options */
.q{margin:12px 0}.q .qq{font-weight:600;margin-bottom:8px}
.opts{display:flex;flex-direction:column;gap:7px}
.opt{border:1px solid var(--line);background:var(--panel);border-radius:10px;padding:12px 13px;text-align:left;cursor:pointer;font-size:13.5px;color:var(--ink);min-height:var(--tap);position:relative}
.opt:hover{border-color:var(--accent)}
.opt:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.opt.sel{border-color:var(--accent);background:var(--accentsoft);box-shadow:0 0 0 1px var(--accent) inset}
.opt.right{border-color:var(--good);background:var(--good-bg)}
.opt.chosenwrong{border-color:var(--bad);background:var(--bad-bg)}
.opt .why{font-size:12px;color:var(--dim);margin-top:5px;display:none}
.opt.show-why .why{display:block}
.opt .tag{float:right;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);border:1px solid var(--line);border-radius:999px;padding:1px 7px;margin-left:8px}
.opt .tag.rec{color:var(--good);border-color:var(--good)}
.predict-feed{font-size:12.5px;margin-top:8px;color:var(--dim)}

.h3{font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:var(--dim);margin:18px 0 6px;font-weight:700}

/* games */
.game{border:1px dashed var(--accent);background:var(--accentsoft);border-radius:12px;padding:14px;margin:12px 0}
.game .gh{font-weight:700;color:var(--accent);font-size:13.5px;margin-bottom:3px}
.game .gd{font-size:12.5px;color:var(--dim);margin-bottom:11px}
.bins{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:560px){.bins{grid-template-columns:1fr}}
.bin{border:1px solid var(--line);border-radius:10px;background:var(--panel);padding:9px;min-height:64px}
.bin h4{margin:0 0 6px;font-size:12px}
.chip{display:inline-block;border:1px solid var(--line);background:var(--panel);border-radius:8px;padding:9px 11px;margin:3px;font-size:12.5px;cursor:pointer;color:var(--ink);min-height:38px}
.chip:hover{border-color:var(--accent)}
.chip:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.chip.good{border-color:var(--good);background:var(--good-bg)}.chip.bad{border-color:var(--bad);background:var(--bad-bg)}
.pool{display:flex;flex-wrap:wrap;gap:2px;margin-bottom:8px;min-height:30px}
.gfeed{font-size:12.5px;margin-top:10px;font-weight:600}
.gfeed.ok{color:var(--good)}.gfeed.no{color:var(--bad)}
.gwhy{font-size:12px;color:var(--dim);font-weight:400;margin-top:5px}
.orderlist{display:flex;flex-direction:column;gap:6px}
.ordit{display:flex;gap:10px;align-items:center;border:1px solid var(--line);border-radius:9px;padding:11px;background:var(--panel);cursor:pointer;font-size:13px;color:var(--ink);min-height:var(--tap)}
.ordit:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.ordit .seq{font:700 11px ui-monospace,monospace;min-width:20px;height:20px;border-radius:6px;background:var(--line2);color:var(--dim);display:flex;align-items:center;justify-content:center}
.ordit.picked .seq{background:var(--accent);color:#fff}
/* trim game with title-safe frame */
.tsf{margin:8px 0;border-radius:10px;overflow:hidden;border:1px solid var(--line)}
.tsf .frame{position:relative;background:#10202f;aspect-ratio:16/6;display:flex;align-items:flex-end;padding:7%}
.tsf .safe{position:absolute;inset:6% 5%;border:1px dashed rgba(255,255,255,.35);border-radius:4px;pointer-events:none}
.tsf .l3{position:relative;z-index:2;background:linear-gradient(90deg,#1d4ed8,#1e3a8a);color:#fff;font:700 clamp(11px,2.6vw,15px)/1.25 -apple-system,Segoe UI,sans-serif;letter-spacing:.02em;padding:7px 12px;border-radius:4px;max-width:90%;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.tsf .l3.over{outline:2px solid #f0726a}
.tsf .l3 .clip{color:#ffd1cd}
.trimrow{display:flex;gap:9px;align-items:center;border:1px solid var(--line);border-radius:9px;padding:10px 11px;background:var(--panel);margin:6px 0;cursor:pointer;font:13px ui-monospace,Menlo,monospace;color:var(--ink);min-height:var(--tap)}
.trimrow:hover{border-color:var(--accent)}.trimrow.pick{border-color:var(--accent);background:var(--accentsoft)}
.trimrow:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.cc{margin-left:auto;font:700 11px ui-monospace,monospace}.cc.good{color:var(--good)}.cc.warn{color:var(--warn)}.cc.bad{color:var(--bad)}
/* branch game */
.branch .scene{border:1px solid var(--line);border-radius:10px;background:var(--panel);padding:12px;margin-bottom:8px;font-size:13.5px}
.branch .conseq{border-radius:10px;padding:11px 13px;margin:9px 0;font-size:13px}
.branch .conseq.bad{background:var(--bad-bg);border:1px solid var(--bad)}
.branch .conseq.bad b{color:var(--bad)}
.branch .conseq.good{background:var(--good-bg);border:1px solid var(--good)}
.branch .conseq.good b{color:var(--good)}

/* quiz */
.quizq{margin:11px 0;padding:12px 13px;border:1px solid var(--line);border-radius:10px;background:var(--bg)}
.qt{font-weight:600;margin-bottom:8px}
.qo{display:flex;flex-direction:column;gap:6px}
.qopt{border:1px solid var(--line);border-radius:9px;padding:11px;background:var(--panel);text-align:left;cursor:pointer;font-size:13px;color:var(--ink);min-height:var(--tap)}
.qopt:hover{border-color:var(--accent)}.qopt.correct{border-color:var(--good);background:var(--good-bg)}.qopt.wrong{border-color:var(--bad);background:var(--bad-bg)}
.qopt:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.qexpl{font-size:12.5px;color:var(--dim);margin-top:8px;display:none}.qexpl.show{display:block}

/* tools box */
.toolsbox{border:1px solid var(--line);border-radius:11px;background:var(--bg);padding:12px;margin:12px 0}
.toolsbox h4{margin:0 0 3px;font-size:13px;color:var(--accent)}
.toolsbox .sub{font-size:12px;color:var(--dim);margin-bottom:9px}
.tool{display:flex;gap:10px;align-items:flex-start;border:1px solid var(--line);border-radius:9px;background:var(--panel);padding:10px;margin:6px 0;cursor:pointer;min-height:var(--tap)}
.tool:hover{border-color:var(--accent)}
.tool:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.tool.on{border-color:var(--good);background:var(--good-bg)}
.tool .box{width:18px;height:18px;border-radius:5px;border:1px solid var(--line);flex:0 0 auto;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff}
.tool.on .box{background:var(--good);border-color:var(--good)}
.tool .tn{font-weight:600;font-size:13px}
.tool .td{font-size:12px;color:var(--dim);margin-top:2px}
.tool .pill{font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;border:1px solid var(--line);border-radius:999px;padding:1px 7px;margin-left:6px;color:var(--dim)}
.tool .pill.rec{color:var(--good);border-color:var(--good)}
.tool .pill.sup{color:var(--bad);border-color:var(--bad)}
.tool.sup{opacity:.7;cursor:default}.tool.sup .tn{text-decoration:line-through}

/* tables */
.tinytable{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:6px}
.tinytable td{border:1px solid var(--line);padding:6px 9px;vertical-align:top}
.tinytable td:first-child{font-weight:600;color:var(--accent);white-space:nowrap}

/* tell / spec */
.tell{margin-top:12px;border:1px solid var(--line);background:var(--gold-bg);border-radius:10px;padding:12px}
.tell b{color:var(--gold)}
.tell pre{margin:7px 0 0;background:var(--panel);border:1px solid var(--line);border-radius:7px;padding:11px;font:12px ui-monospace,Menlo,monospace;white-space:pre-wrap;color:var(--ink);max-height:200px;overflow:auto}

.btn{background:var(--accent);color:#fff;border:0;border-radius:9px;padding:11px 16px;font-size:13px;font-weight:600;cursor:pointer;min-height:var(--tap)}
.btn:hover{filter:brightness(1.05)}
.btn:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
.btn.ghost{background:var(--bg);color:var(--ink);border:1px solid var(--line)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

/* bottom thumb nav */
.bottomnav{position:fixed;left:0;right:0;bottom:0;z-index:25;background:var(--panel);border-top:1px solid var(--line);display:flex;gap:8px;align-items:center;padding:8px clamp(10px,3vw,16px);padding-bottom:calc(8px + env(safe-area-inset-bottom));box-shadow:0 -4px 16px -10px rgba(16,32,55,.3)}
.bottomnav .mid{flex:1;text-align:center;font-size:12px;color:var(--dim)}
.bottomnav .btn{flex:0 0 auto}
@media(min-width:1041px){.bottomnav{left:0;right:360px}}

.toast{position:fixed;bottom:78px;left:50%;transform:translateX(-50%);background:#13243f;color:#eaf1ff;border:1px solid #2a4a78;border-radius:10px;padding:10px 16px;font-size:13px;opacity:0;transition:opacity .2s,bottom .2s;pointer-events:none;z-index:60}.toast.show{opacity:1;bottom:88px}
.spark{position:fixed;width:8px;height:8px;border-radius:50%;pointer-events:none;z-index:70}
.sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}
.celebrate{border:1px solid var(--good);background:var(--good-bg);border-radius:11px;padding:12px;margin:12px 0;font-size:13.5px}
.celebrate b{color:var(--good)}

@media(prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;transition-duration:.001ms!important}}
</style>
</head>
<body data-theme="light">
<div class="app">
  <header class="top">
    <h1>GSR Automation <b>v2</b> // Design Your Own System <span class="badge" id="phaseTag">Start</span></h1>
    <div class="htools">
      <button class="tbtn" id="btnPipe" aria-label="Toggle pipeline panel">Pipeline</button>
      <button class="tbtn" id="btnSetup">Decisions &amp; Setup</button>
      <button class="tbtn primary" id="btnSpec">Build Spec</button>
      <button class="tbtn" id="btnTheme" aria-label="Toggle light or dark theme">Theme</button>
      <button class="tbtn" id="btnSave">Save</button>
      <button class="tbtn" id="btnLoad">Load</button>
      <input type="file" id="fileImport" hidden accept="application/json">
      <button class="tbtn" id="btnReset">Reset</button>
    </div>
  </header>
  <main id="main"></main>
  <aside class="rail" id="rail" aria-label="Pipeline and build spec">
    <h2>Your episode pipeline</h2>
    <div class="pipewrap" id="pipewrap"></div>
    <div class="payload" id="payload" aria-live="polite"></div>
    <div class="buildspec">
      <h2>Your build spec so far</h2>
      <div id="buildspec"></div>
    </div>
    <div class="storemode" id="storemode"></div>
  </aside>
</div>
<nav class="bottomnav" aria-label="Module navigation">
  <button class="btn ghost" id="navPrev">&#8592; Prev</button>
  <div class="mid" id="navMid" aria-live="polite"></div>
  <button class="btn" id="navNext">Next &#8594;</button>
</nav>
<div class="toast" id="toast" role="status" aria-live="polite"></div>
<div class="sr" id="srlive" aria-live="polite"></div>
<script>
"use strict";
/* ===================== storage shim (localStorage -> memory) ===================== */
var store=(function(){var mem={};try{localStorage.setItem("__t","1");localStorage.removeItem("__t");
 return{get:function(k){return localStorage.getItem(k);},set:function(k,v){localStorage.setItem(k,v);},mode:"localStorage"};}
 catch(e){return{get:function(k){return (k in mem)?mem[k]:null;},set:function(k,v){mem[k]=v;},mode:"memory (this tab only)"};}})();
var KEY="gsr_v2_course_v3";

/* ===================== pipeline stages (the persistent diagram) ===================== */
/* Each stage maps to a module; token accumulates payload as it advances. */
var STAGES=[
 {id:"intake",label:"Intake",mod:1,add:"title"},
 {id:"lt",label:"Lower Thirds",mod:2,add:"lower thirds"},
 {id:"graphics",label:"Graphics",mod:3,add:"graphics"},
 {id:"rundown",label:"Rundown",mod:4,add:"rundown"},
 {id:"propres",label:"ProPresenter",mod:5,add:""},
 {id:"shoot",label:"Shoot",mod:6,add:""},
 {id:"transcribe",label:"Transcript",mod:7,add:"transcript"},
 {id:"metadata",label:"Metadata",mod:8,add:"metadata"},
 {id:"distribute",label:"Distribution",mod:9,add:""},
 {id:"published",label:"Published",mod:10,add:"published"}
];

/* ===================== tool registry (CANON section 12, reconciled) ===================== */
/* kind: rec = current recommended pick; hon = honorable mention; sup = superseded (never recommend) */
var TOOLS={
 intake:[
  {id:"local_watcher",name:"Local Mac watcher (fswatch / Hazel / Automator)",kind:"rec",d:"Watches the editor's master-export folder on the Mac. The only sanctioned file-watch."},
  {id:"fs_watch",name:"Node fs.watch (local only)",kind:"hon",d:"Built-in, no dependency, for a small local helper."},
  {id:"chokidar_nas",name:"Chokidar-on-NAS",kind:"sup",d:"NAS file-watchers are barred. Local only if used at all."}
 ],
 lt:[
  {id:"anthropic_sdk",name:"@anthropic-ai/sdk (server-side)",kind:"rec",d:"Already in the app; used only for lower-thirds extraction and regenerate variations."},
  {id:"vercel_ai",name:"Vercel AI SDK",kind:"hon",d:"Alternative wrapper if you standardize on it later."}
 ],
 graphics:[
  {id:"supabase_db",name:"Supabase Postgres (production_graphics)",kind:"rec",d:"The tracker table; mirrors the monthly Google Sheet."},
  {id:"sheets_sync",name:"Google Sheets read (optional mirror)",kind:"hon",d:"Read-only sync of the live sheet for interns who still use it."}
 ],
 rundown:[
  {id:"rc_api",name:"Rundown Creator write API (insertRow / setRowProperties / deleteRow)",kind:"rec",d:"The real RC actions for fluid reconcile. Errors come back as HTTP 200, read the body."},
  {id:"rc_deeplink",name:"Deep-link into RC + column-accurate preview grid",kind:"hon",d:"Reliable fallback if RC blocks being embedded."}
 ],
 transcribe:[

var M=[
{id:"m0",num:0,phase:"Ground",stage:null,title:"Orientation and GitHub: How This Course and Your Repo Work",
 subtitle:"Learn how the pipeline fits together and how to change your app safely on GitHub, so a mistake never reaches your real, working show.",
 mat:"",
 predict:{q:"Where do you make changes so a mistake never reaches your real, working app?",
  opts:[{t:"On a branch, a safe scratch copy you review before it counts",ok:1,why:"Right. A branch is a private sandbox copy. You try things there, review the result, and only then let it count. Your real app is never at risk."},
        {t:"Straight on main, the live working version",ok:0,why:"main is the real, working version. Editing it directly means an untested mistake is live with nothing between you and it."},
        {t:"Directly in the running app with no copy",ok:0,why:"There is no undo and no review there. The whole point is to work on a copy first."}]},
 lesson:"<p><b>How this course works.</b> Each module follows the same gentle rhythm: you <b>predict</b> an answer, you <b>learn</b> the idea in plain English, you play a quick <b>game</b> to make it stick, you take a short <b>quiz</b>, then you <b>lock a decision</b>. The course remembers every choice you make and quietly adapts the later modules to match it. At the very end it <b>exports a build plan</b>: a tidy document you can hand to Claude to actually build the system. You are not coding here. You are deciding how your show's system should behave.</p><p><b>What GitHub is, for a non-coder.</b> Think of it as the home for your project with a perfect memory. A <b>repo</b> is the project folder, holding every file plus its full history. A <b>commit</b> is a save point, a labeled snapshot you can always return to. A <b>branch</b> is a safe scratch copy where you try changes without touching the real thing. A <b>pull request</b> (PR) is a proposed set of changes you get to review before they count. <b>Merging</b> is saying yes to those changes. <b>main</b> is the real, working version of your app. The big idea: <b>Git is your undo button.</b> Nothing is ever truly lost, and nothing risky is live until you approve it.</p><p><b>How to ask Claude Code to fix something.</b> You never edit code by hand. You describe the <b>symptom</b> in plain English (what you saw, on which page), point Claude at the <b>file or page</b>, and let it do the work on a <b>branch</b> and open a <b>PR</b> you can review. You read the summary, and if it looks right, you approve. If it does not, nothing was lost. That is the whole loop, and it is hard to break.</p>",
 deeper:"<p><b>The staged workflow, slightly more technically.</b> Work happens on a <code class='inl'>feat/</code> or <code class='inl'>fix/</code> branch inside the <code class='inl'>gsr-automation-v2</code> repo. Claude opens a <b>draft PR</b>, the app runs <code class='inl'>npx tsc --noEmit</code> (a type check) and <code class='inl'>npx eslint src/</code> (a style and error check), and only when those are clean does the change get a <b>squash merge</b>, which collapses the whole feature into one tidy, revertible commit on <code class='inl'>main</code>. So <code class='inl'>main</code> always stays clean and easy to roll back.</p><p><b>How to read a PR.</b> The <b>diff</b> is the record of exactly what changed: removed lines in red, added lines in green. You do not need to read code; the diff plus Claude's plain summary tells you the shape of the change.</p><p><b>Four words you will keep seeing.</b> <b>Client vs server:</b> the browser is the public storefront, the server is the locked back office where secrets live. <b>Database:</b> a shared spreadsheet with rules that many programs read and write (yours is Supabase). <b>API:</b> a defined way for one program to ask another for something. <b>JSON:</b> the labeled note format those requests travel in.</p><p><b>The David Rule (the one hard line).</b> Automation may write the database and call cloud APIs, because those are safe and reversible. It must <b>never</b> touch the live broadcast chain: ProPresenter on air, the ATEM switcher, or Bitfocus Companion. A mistake there lands on David live, on screen, with no undo. A human always loads the live gear.</p>",
 analogy:"A branch is like a draft copy of an important document. You write and rearrange freely in the draft, share it for review, and only publish the final version once everyone has signed off. The published version (main) is never touched until the draft is approved. And one stove rule sits on top of it all: the live broadcast chain is the open flame nobody automated reaches across.",
 game:{type:"sort",h:"Branch first, or never?",d:"Tap each action into the right bin. Safe changes happen on a branch and get reviewed; risky ones never go straight to the live version.",
   binA:"Do this on a branch first (safe)",binB:"Never do this straight to main",
   items:[["Try an experimental change","A","A branch is a sandbox. Experiment freely; nothing real is affected until you merge."],
          ["Open a draft PR to review a change","A","A PR lets you see the diff and approve before it counts. This is the review step."],
          ["Run tsc and eslint before merging","A","These checks catch type and style errors on the branch, so only clean work reaches main."],
          ["Push an untested change directly to main","B","main is the real, working app. An untested change there is live with no safety net."],
          ["Edit the live app with no review","B","No diff, no PR, no undo. Always go through a branch and a review first."],
          ["Let automation push to ProPresenter on air","B","The live chain is off-limits; a human loads."]]},

  {q:"What does opening a PR and merging it do?",o:["It deletes old files","It lets you review a proposed change, then accept it onto main once it looks right","It restarts the server"],a:1,e:"A pull request is the review gate; merging accepts the change onto the real, working version."},

 lesson:"<p>You keep your own process for research, guests, outreach, and writing. The system <b>starts by ingesting what you produce.</b> You upload a <b>script per segment</b> as plain teleprompter text; prerecorded segments come in as their <b>transcript</b> instead.</p><p>Lower thirds are a <b>separate, optional file</b>, never required at upload, importable at any time for any segment. Parsing that file into rows is deterministic, not AI, so it is safe: upload, preview the counts, type YES, it lands.</p>",
 deeper:"A real interview script doc (shown here with fictional sample data) has an INTERVIEW SET UP block, INTERVIEW QUESTIONS, a RESOURCE TAG, then a <code class='inl'>LOWER THIRDS</code> block with TOPIC L3, GUEST CHYRON and DISCUSSION L3s. That LOWER THIRDS block is the source the optional file is parsed from. Script-generation automation is a deferred hook; leave it wired but off.",
 analogy:"Think of a loading dock, not a kitchen. You are not asking the system to cook the meal (write scripts), only to receive the crates (scripts) and the separate parts box (lower thirds) and shelve them correctly.",
 game:{type:"sort",h:"Route the upload",d:"Where does each item go on intake?",

{id:"m2",num:2,phase:"Pre-Production",stage:"lt",title:"Lower Thirds: the Variation Picker",
 subtitle:"A polished spreadsheet. Pick one of three takes per line; one Send pushes them to air-safe.",
 mat:"manual",
 predict:{q:"A chyron line you wrote runs to 71 characters. What should the page do?",
  opts:[{t:"Flag it: it is over the 65 hard ceiling",ok:1,why:"Right. 65 is the hard ceiling. Over that, it gets flagged and the chyron truncates rather than overflowing the title-safe area on air."},
        {t:"Ship it as-is",ok:0,why:"Too long. It would spill past the title-safe frame on screen."},
        {t:"Let it wrap to two lines",ok:0,why:"Lower thirds are single-line chyrons; wrapping is not the fix. Trim to the band."}]},
 lesson:"<p>A clean spreadsheet, one row per lower third (beat), grouped by segment. Each row offers <b>three variations</b> (Primary, Var 1, Var 2); you pick one, with a live <b>character count</b> colored against the 55 to 65 band. One <b>Send</b> button formats them ALL CAPS, validates the band, asks you to type YES, then pushes to the <b>Lower Thirds presentation</b> in ProPresenter.</p><p>Rules: ALL CAPS; 55 to 65 characters, never over 65; the pipe character only for a <code class='inl'>NAME | ORG | FIELD</code> chyron; colon for topic lines. Lower thirds <b>never</b> go to Rundown Creator and live in a different ProPresenter presentation than graphics.</p>",
 deeper:"Often about 15 lower thirds per segment, but however many exist. The chosen variation is the highlighted one; a real build adds a one-tap cycle button. Send maps each row to its slide and on-screen position by beat (the guest chyron goes to the chyron slot).",
 analogy:"Like picking the best take of a line read. Three takes are recorded; you listen and circle one, then the whole reel goes to air. You are not rewriting, you are selecting.",
 game:{type:"trim",h:"Make it fit the title-safe frame",d:"Tap a line to preview it in a TV title-safe frame. Pick the one that lands 55 to 65, ALL CAPS, no banned punctuation.",
   options:[["THE GREEN RIVER CUTS STRAIGHT THROUGH A SOLID MOUNTAIN RANGE",1,"In band, ALL CAPS, clean punctuation. It sits inside the safe area."],
            ["the green river cuts through a mountain",0,"Under 55 and not ALL CAPS."],
            ["A RIVER THAT, AGAINST ALL ODDS, CARVES THROUGH HARD ROCK AND MORE",0,"Over 65; it overflows the title-safe frame and gets clipped."]]},
 quiz:[
  {q:"A chyron assembles to 71 characters. What happens?",o:["It ships","It is over 65, so it is flagged and the chyron truncates rather than overflow","It wraps to two lines"],a:1,e:"65 is the hard ceiling; the title-safe frame makes overflow obvious."},
  {q:"Do lower thirds go to Rundown Creator?",o:["Yes","No. Only graphics go to RC; lower thirds have their own ProPresenter presentation","Sometimes"],a:1,e:"Lower thirds and graphics are fully separate systems."}
 ],

   {id:"pick3",label:"3-variation picker + char band + one Send to the LT presentation",tag:"recommended",rec:1,why:"Simple and fast, keeps your eye on the band, and pushes formatted lines to the right ProPresenter presentation."},
   {id:"autopick",label:"Auto-pick the variation in the band with no review",tag:"risky",why:"A wrong chyron could reach air. Keep the human pick; the Send gate is your safety net."}],

{id:"m3",num:3,phase:"Pre-Production",stage:"graphics",title:"Graphics: Ideas, Approval & the Tracker",
 subtitle:"Separate from lower thirds. Ideas approved, then designed on a tracker that matches your sheet.",
 mat:"manual",
 predict:{q:"A graphic idea is approved and a designer is assigned. What unlocks the push to ProPresenter?",
  opts:[{t:"The status hits Created and a filename is entered",ok:1,why:"Right. Approval starts design; only Created + filename means the file actually exists and can be pulled from the Videoedit server."},
        {t:"Approval alone",ok:0,why:"Approval just starts the design. There is no file yet to push."},
        {t:"Nothing, it auto-pushes",ok:0,why:"Graphics are human-made and the push is gated; nothing auto-pushes to the live machine."}]},
 lesson:"<p>Graphics are <b>separate</b> from lower thirds: designed visual assets (title cards, b-roll, screenshots, montages, ProPresenter quotes). Flow: generate <b>ideas</b>, you <b>approve</b>, the design team picks them up on the <b>Graphics Tracker</b>, which matches your monthly Google Sheet: columns Segment, Graphic #, Graphic Type, Description, Status, Assigned To, Notes; tabs Show 1 to 5.</p><p>Statuses run <b>Not Started -> In Progress -> Created -> Loaded In</b>. When a row hits <b>Created with a filename</b>, the file is pulled from the Videoedit server and a <b>Push to ProPresenter</b> action lights up. A <b>Master tab</b> shows all five shows at once; drilling into a segment shows the <b>script side by side</b> with each graphic's spot highlighted, so interns know what a b-roll clip is for before sourcing from Storyblocks, Dreamstime, or Envato.</p>",
 deeper:"Graphic Type values include Title Graphic, B-roll, Pre-made: B-roll, Article Screenshot, Picture, Propres Quote, Roll-in, and <b>Book Cover</b> (Book Cover is in the sheet but missing from the DB CHECK, a prereq fix). Assignees: Isaac (monologue + both interviews), Jakob (roll-in segments), Jeremiah (b-roll), Gabe (GSM roll-ins), Daniel (article screenshots). Philosophy from ~1,737 logged graphics: quantity over quality, generic over specific, reusable over one-off; never leave an empty cue slot.",
 analogy:"The tracker is a kitchen ticket rail. A ticket (graphic idea) is approved and clipped up; a cook takes it, plates it (Created + filename), and only a plated dish reaches the pass (ProPresenter). No ticket, no plate; no plate, no pass.",
 game:{type:"order",h:"Status flow",d:"Tap the four statuses in the order a graphic moves through them.",

{id:"m4",num:4,phase:"Pre-Production",stage:"rundown",title:"Rundown Build (Graphics to Rundown Creator)",
 subtitle:"Approved graphics become rundown cues. The TD runs from this, so you preview before any write.",
 mat:"manual",
 predict:{q:"You have more approved graphics than the rundown has default rows. What should the build do?",
  opts:[{t:"Insert rows in the right place to match the real count",ok:1,why:"Right. The rundowns are pre-built with default rows; the build reconciles fluidly, inserting and deleting in the correct place."},
        {t:"Drop the extra graphics",ok:0,why:"Never leave a graphic off the rundown. The build adds rows."},
        {t:"Ask you to add each one by hand in RC",ok:0,why:"That is the manual pain we are removing. The build reconciles automatically, you just confirm the preview."}]},
 lesson:"<p>Approved <b>graphics</b> (not lower thirds) are written into Rundown Creator, <b>each graphic its own row</b>. The <b>Graphics</b> column (col 1) gets the graphic; the <b>Last Line</b> column (col 4) gets the final script line before the next graphic; <b>Notes</b> holds the duration in <b>sentences</b> until the next graphic. Both are computed from where each graphic sits in the script.</p><p>Your rundowns for the year already exist with a default row count. The build is <b>fluid</b>: it deletes unused rows and inserts new ones in the right place to match the real graphic count, updating in place keyed by segment + beat. You confirm with a <b>preview that mirrors the RC columns</b> before anything writes.</p>",
 deeper:"RC errors arrive as <b>HTTP 200 with a JSON error body</b>, so always read the body. The write actions are insertRow, setRowProperties, deleteRow, reorderRows. Segments map to fixed RC row codes (Show Intro B2, Opening Monologue B3, Interview 1 B11 then C2, and so on). Per-show RundownIDs change each cycle and are listed via rc-explore; Daniel has pre-built the year's rundowns in monthly folders.",
 analogy:"Like setting a dinner table to the actual headcount. The table is pre-laid for ten; eight show up, you quietly clear two settings; twelve show up, you add two. You glance at the whole table (the preview) before guests sit.",
 game:{type:"sort",h:"Which RC column?",d:"Where does each piece go in Rundown Creator?",
   binA:"Graphics column (1)",binB:"Last Line column (4)",
   items:[["The approved graphic","A","Col 1 carries the graphic itself."],
          ["The last spoken line before the next graphic","B","Col 4 is the Last Line: when this graphic can stay up until."],
          ["B-roll: river canyon","A","Still a graphic, so col 1."],
          ["The cut cue to switch graphics","B","That cue is the Last Line boundary in col 4."]]},
 quiz:[
  {q:"What goes in the Notes column for a graphic?",o:["The title","The duration in sentences until the next graphic","The assignee"],a:1,e:"Notes = sentence-duration, auto-computed from the graphic's script anchor."},
  {q:"RC returns an error. How does it arrive?",o:["As an HTTP 500","As HTTP 200 with a JSON error body, so always read the body","As a thrown exception"],a:1,e:"RC always returns 200; the body tells you if it failed."}
 ],
 decision:{question:"Lock the rundown push.",opts:[
   {id:"preview",label:"Manual confirm via an RC-mirror preview; fluid insert/delete; update in place",tag:"recommended",rec:1,why:"The TD runs from this, so you eyeball a column-accurate preview before any write, and rows reconcile to the real count automatically."},
   {id:"autorc",label:"Auto-write to RC on every change",tag:"risky",why:"RC is flaky and feeds the TD. Keep the preview and confirm."}],
  specs:[["Per graphic","its own row: Graphics col 1, Last Line col 4, Notes = sentences"],["Reconcile","insert/delete rows to match count, update in place by segment+beat"],["Confirm","RC-mirror preview, then write"],["API","insertRow / setRowProperties / deleteRow / reorderRows"]]},
 spec:{status:"partial",dependsOn:["m3"],blockedBy:["Rundown Creator API access (APIKey + APIToken in 1Password)"],
  db:"Reads approved rows from production_graphics; writes to RC, not the DB. episodes.rundown_creator_id maps the per-show RundownID.",
  routes:"/api/rc-explore (exists, lists/reads), /api/rc-import (exists, reads). Add a write path /api/rc-push (insertRow/setRowProperties/deleteRow/reorderRows).",
  api:"Base https://www.rundowncreator.com/[channel]/API.php, auth APIKey + APIToken (1Password item 'Rundown Creator API'). RC RETURNS ERRORS AS HTTP 200 WITH A JSON BODY, so always read the body. Graphics col 1, Last Line col 4, Notes = sentence duration.",
  io:"INPUT: approved graphics in script order. OUTPUT: reconciled RC rows after a confirmed preview.",
  acceptance:["WHEN the rundown build runs THE SYSTEM SHALL render an RC-mirror preview (row, segment, Graphics, Last Line, Notes) before any write.",
   "WHEN there are more graphics than default rows THE SYSTEM SHALL insertRow in the correct place; WHEN fewer, it SHALL deleteRow the unused defaults.",
   "IF an RC response body contains an error THEN the system SHALL surface it and not report success (errors arrive as HTTP 200).",
   "WHEN a graphic already has a row THE SYSTEM SHALL update it in place keyed by segment+beat, never duplicate."],
  verify:["npx tsc --noEmit","npx eslint src/","Manual: run a dry preview against a test RundownID, confirm columns match RC, then confirm one insert and one delete reconcile correctly."],
  nonauto:"Setting up RC API access (key + token in 1Password) is a Daniel TODO; lower thirds never go here."},

{id:"m5",num:5,phase:"Live",stage:"propres",title:"ProPresenter Load (the Read-Only Line)",
 subtitle:"The one piece of live gear. The sharpest test of the David Rule. The system signals; a human loads.",
 mat:"manual",
 predict:{q:"The dashboard could technically push a slide straight to the on-air ProPresenter machine. Should it?",
  opts:[{t:"No. It surfaces a 'ready' signal; a human does the load",ok:1,why:"Right. ProPresenter is live gear. The system signals readiness; a person loads it. No automation commands the production machine until David approves a tested path."},
        {t:"Yes, if the graphic is Created",ok:0,why:"Created is the readiness gate, but the push itself stays human. The live machine is off-limits to automation."},
        {t:"Yes, always, that is the point of automation",ok:0,why:"Not here. This is exactly the David Rule line: a wrong push lands on David, on air."}]},
 lesson:"<p>ProPresenter is the one piece of live gear, so it is the sharpest test of the David Rule. Lower thirds and graphics live in <b>separate presentations</b>, inside the month's <b>5x show playlist templates</b>. A graphic becomes loadable only once its tracker status is <b>Created</b> with a filename.</p><p>The system <b>surfaces a ready signal and a human does the load</b>. No automation commands the production machine until you approve a tested path. Mapping each item to the right slide and position is real work you will define at your computer.</p>",
 deeper:"GSN-PropRes lives at Tailscale 100.98.215.7 and is permanently off-limits to automation after the 2026-05-20 security incident. The slide/presentation/playlist mapping is a deferred Daniel TODO, defined at his computer; until then the push is a signal only.",
 analogy:"The dashboard is the on-deck circle, not the batter's box. It tells the loader exactly what is ready and where it goes; a person steps up and swings. The machine on air is never swung for it.",
 game:{type:"branch",h:"The push decision (with consequences)",d:"You are wiring the ProPresenter step. Choose, then see how it plays out. You can rewind.",
   scene:"A graphic for tonight's show is approved but its status is still In Progress with no filename. You build the push action. What does it do when someone clicks it?",
   opts:[
    {id:"gate",label:"Only enable the push once status is Created AND a filename exists; a human triggers it",ok:1,
     conseq:{kind:"good",text:"The button stays greyed out because the file does not exist yet. Nobody can push an empty slot to air. When the designer finishes and enters the filename, it lights up and a human loads it. The David Rule held."}},
    {id:"approve",label:"Enable the push as soon as the idea is approved",ok:0,
     conseq:{kind:"bad",text:"Showtime. A loader clicks push for an approved-but-undesigned graphic. ProPresenter pulls a missing file and shows a blank or an error slide on air. David has to cover for it live. This is exactly the outcome the David Rule exists to prevent. Rewind and gate on Created + filename."}},
    {id:"auto",label:"Auto-push to the production machine the moment it is Created",ok:0,
     conseq:{kind:"bad",text:"Automation just commanded the on-air machine with no human in the loop. Even with a correct file, an unattended push to live gear is off-limits until David approves a tested path. Rewind: surface a signal, let a human load."}}
   ],
   rewindLabel:"Rewind and choose again"},
 quiz:[
  {q:"Who triggers the ProPresenter load?",o:["Automation, live","A human, from the ready signal","The TD only, automatically"],a:1,e:"Human-triggered; the production machine stays off-limits to automation."},
  {q:"When does a graphic become loadable?",o:["When approved","When status is Created and a filename is entered","As soon as it has a designer"],a:1,e:"Created + filename is the gate; that is when the file actually exists."}
 ],
 decision:{question:"Lock the ProPresenter posture.",opts:[
   {id:"signal",label:"System signals ready (on Created+filename); human loads; mapping defined later",tag:"recommended",rec:1,why:"Captures the value while keeping the on-air machine human-operated. The David Rule made literal."},
   {id:"autopush",label:"Auto-push to the live machine",tag:"off-limits",why:"Against the David Rule until David approves a tested path. The branch above shows why."}],
  specs:[["Gate","Created + filename"],["Presentations","lower thirds and graphics separate"],["Templates","monthly 5x show playlists"],["Push","human-triggered; mapping is a Daniel TODO at his computer"]]},
 spec:{status:"new",dependsOn:["m3"],blockedBy:["ProPresenter slide/presentation/playlist mapping (Daniel TODO)","David's approval of any tested live path"],
  db:"Reads production_graphics (status, filename). No DB write for the push itself.",
  routes:"A 'ready to load' panel inside /graphics. No route commands the production machine.",
  api:"None to the production machine. The action is a UI signal that a human acts on. GSN-PropRes (100.98.215.7) is off-limits to automation.",
  io:"INPUT: Created graphics with filenames. OUTPUT: a human-readable ready signal mapping graphic -> presentation/slot.",
  acceptance:["WHEN a graphic is Created with a filename THE SYSTEM SHALL show a ready-to-load signal naming the target presentation and position.",
   "IF any code path would send a command to the production ProPresenter THEN it SHALL be refused until David approves a tested path.",
   "WHEN lower thirds and graphics are loaded THE SYSTEM SHALL keep them in separate presentations."],
  verify:["npx tsc --noEmit","npx eslint src/","Manual: confirm no network call targets 100.98.215.7; confirm the ready signal appears only on Created + filename."],
  nonauto:"The actual load into ProPresenter is done by a human; the slide mapping is defined with Daniel at his computer."},
 toolsKey:null,
 gateRender:function(g){ if(g.m5BranchPassed){return "<div class='note good'>In the consequence game you respected the Created + filename gate, so your recap below reflects a safe push posture.</div>";} if(g.m5BranchPlayed){return "<div class='note warn'><b>From the consequence game:</b> the wrong choice put a blank slide on air for David to cover. Your locked posture should gate on Created + filename and keep the push human-triggered.</div>";} return ""; }},

{id:"m6",num:6,phase:"Production",stage:"shoot",title:"The Shoot (the Hinge)",

{id:"m7",num:7,phase:"Post-Production",stage:"transcribe",title:"Transcription (Local, with Speakers)",
 subtitle:"No Dropbox clutter, no new work for the team. One Mac-native tool, speaker labels included.",
 mat:"manual",
 predict:{q:"You need a transcript with speaker labels. How should the audio be created?",
  opts:[{t:"Auto-extract it locally from the master with ffmpeg",ok:1,why:"Right. A local Mac watcher pulls a small audio file from the editor's master export. Nobody makes an extra file; nothing clutters Dropbox."},
        {t:"Ask the team to drop an audio-only file in Dropbox",ok:0,why:"That clutters Dropbox and adds a step for everyone. Extract locally instead."},
        {t:"Skip transcription",ok:0,why:"Speaker-labeled transcripts drive metadata, data, and social. They matter."}]},
 lesson:"<p>No one makes an extra audio file that clutters Dropbox. A <b>local Mac automation</b> (Automator Folder Action, Hazel, or fswatch) watches the editor's finished-master export folder, auto-extracts a small audio file with ffmpeg into a local folder, and transcribes. The team does nothing new.</p><p><b>Speaker differentiation matters</b> (it drives metadata, data, and social), but through <b>one tool</b>, not a service per speaker: <b>WhisperKit + SpeakerKit</b> (Mac-native) produces a speaker-labeled transcript plus captions, written to Supabase.</p>",
 deeper:"Extract about 16kHz mono into a local working folder (for example ~/Productions/Audio); output a speaker-tagged transcript plus SRT/VTT into the transcripts table. WhisperKit's 2.2% WER is a vendor number, so sanity-check the diarization on a real two-person interview. A LOCAL watcher is fine; NAS/QNAP file-watchers stay barred.",
 analogy:"Like a court stenographer who also notes who is speaking. One person, one pass, a labeled transcript, not a separate microphone tech for each voice.",
 game:{type:"order",h:"Build the transcription pipeline",d:"Tap the steps in order.",
   items:["WhisperKit + SpeakerKit transcribes","Master export lands locally","Transcript + SRT/VTT saved to Supabase","ffmpeg extracts a small audio file"],
   correct:["Master export lands locally","ffmpeg extracts a small audio file","WhisperKit + SpeakerKit transcribes","Transcript + SRT/VTT saved to Supabase"],
   why:"Land the master locally, extract a small audio file, transcribe with speaker labels, then save to Supabase. All local, no Dropbox clutter."},
 quiz:[
  {q:"Why not have the team drop an audio file in Dropbox?",o:["It is fine","It clutters Dropbox and adds a step; extract locally instead","Dropbox cannot hold audio"],a:1,e:"Local auto-extraction keeps it clean and effortless."},
  {q:"How do you get speaker labels without a separate service per voice?",o:["Two tools","One tool: WhisperKit + SpeakerKit","You cannot"],a:1,e:"A single Mac-native pipeline does transcript plus diarization."}
 ],
 decision:{question:"Lock transcription.",opts:[
   {id:"localdiar",label:"Local auto-extract + WhisperKit/SpeakerKit (speaker-labeled)",tag:"recommended",rec:1,why:"Zero new work for the team, one tool, speaker labels included."},
   {id:"cloudplain",label:"Cloud Whisper, no speaker labels",tag:"limited",why:"Loses the diarization you need for social and data, and pushes media off the Mac."}],
  specs:[["Audio","local Automator/Hazel/fswatch extract with ffmpeg (no Dropbox)"],["Engine","WhisperKit + SpeakerKit, speaker-labeled, on the Mac"],["Output","transcript + SRT/VTT to the transcripts table"]]},
 spec:{status:"new",dependsOn:["m6"],blockedBy:[],
  db:"transcripts (exists): store speaker-tagged transcript + SRT/VTT keyed to the episode.",
  routes:"No Vercel route runs this. A local Mac job writes to Supabase via the service role.",
  api:"Local: fswatch/Hazel -> ffmpeg (~16kHz mono) -> WhisperKit + SpeakerKit -> Supabase insert into transcripts. The Mac polls the jobs table for the trigger.",
  io:"INPUT: master export landing locally. OUTPUT: speaker-labeled transcript + captions in Supabase.",
  acceptance:["WHEN a master export lands in the watched local folder THE SYSTEM SHALL extract a small audio file with ffmpeg without writing anything to Dropbox.",
   "WHEN transcription completes THE SYSTEM SHALL write a speaker-labeled transcript and SRT/VTT to the transcripts table.",
   "IF a file watcher would target the NAS/QNAP THEN it SHALL be refused (local watchers only)."],
  verify:["npx tsc --noEmit","Manual: drop a real two-person interview master locally, confirm the transcript appears in Supabase with correct speaker labels (sanity-check diarization)."],
  nonauto:"This whole job runs on the local Mac, never on Vercel and never on the NAS."},
 toolsKey:"transcribe"},

{id:"m8",num:8,phase:"Post-Production",stage:"metadata",title:"Metadata (Templated, Manually Triggered)",
 subtitle:"Consistent across episodes, so no per-episode AI. You click a button; only the hook and chapters vary.",
 mat:"manual",
 predict:{q:"How should episode descriptions and tags be produced?",

 lesson:"<p>Descriptions and tags are <b>templated and consistent</b> across episodes, so there is no per-episode AI writing. You <b>click a button</b> and the template fills with episode fields. The only variable parts are the <b>title hook</b> (your call) and <b>chapters</b> (from the rundown timecodes).</p><p>Baked in: YouTube <b>category 28</b> (Science & Technology), TV airs <b>Tuesday 8 PM CST</b>, YouTube publishes <b>Monday 4 PM ET</b>. This feeds Distribution next.</p>",
 deeper:"Default tags and the description boilerplate live in config. Sponsor rule: Season-3 episodes 1-24 carry a 60-second sponsor line for Cedarville University; episode 25 onward is sponsor-free. The four locked verbatim lines and the donation number 931-212-7990 are constants the template carries. Two profiles (video + podcast) come from the same template set.",
 analogy:"A mail merge, not an essay. The letter body is fixed; only the name and address change. You are not writing fresh prose each week, you are stamping the variable fields.",

   binA:"Templated (same every time)",binB:"Varies per episode",
   items:[["Description boilerplate","A","Same body every episode."],
          ["Anchor tags","A","The default tag set is constant."],
          ["Category 28","A","Always Science & Technology."],
          ["Title hook","B","Your call, episode by episode."],
          ["Chapters from timecodes","B","Derived from that episode's rundown."]]},

  {q:"Why is metadata not a Claude prompt-handoff?",o:["Claude cannot do it","Descriptions and tags are templated and consistent, so there is no per-episode generation","It is too slow"],a:1,e:"Only the title hook and chapters vary; the rest is a template."},
  {q:"Which YouTube category does GSR use?",o:["24 Entertainment","28 Science & Technology","27 News"],a:1,e:"Category 28; not 24 or 27."}
 ],

   {id:"aimeta",label:"Prompt-handoff generation per episode",tag:"not now",why:"Unneeded; descriptions and tags are consistent across episodes."}],
  specs:[["Engine","stored template + episode fields, button-triggered"],["Variable","title hook (yours), chapters (from timecodes)"],["Constants","category 28; Tue 8 CST air / Mon 4 ET publish; sponsor Ep1-24"]]},

{id:"m9",num:9,phase:"Distribution",stage:"distribute",title:"Distribution: the Publish Map & Where It Runs",
 subtitle:"Your biggest time-saver, built now. The hard fact: the heavy upload cannot run on Vercel.",
 mat:"priority",
 predict:{q:"Your master is multi-gigabyte. Where should the heavy upload actually run?",
  opts:[{t:"On the Mac or a small worker; the dashboard only triggers and tracks",ok:1,why:"Right. Vercel functions cap at 4.5 MB and 15 minutes. The Mac does the heavy lifting; the dashboard writes a job and tracks status."},
        {t:"Inside the dashboard on Vercel",ok:0,why:"Vercel's 4.5 MB / 15 min limits make a multi-GB upload impossible there."},
        {t:"It does not matter where",ok:0,why:"It matters a lot. The Vercel limits decide the whole architecture."}]},
 lesson:"<p>This is your <b>biggest time-saver</b>, so it is built now and pushed toward automation fastest with the dial. But first, the hard fact that shapes everything: <b>the heavy upload cannot run on Vercel.</b> Vercel functions cap at 4.5 MB and 15 minutes, and your master is multi-gigabyte. So the <b>Mac (or a small worker) does the heavy lifting</b> (transcription + the actual uploads) and the <b>dashboard only triggers jobs and tracks status</b>.</p><p>The transport is settled: the <b>dashboard writes a job row to a Supabase jobs table; the Mac polls it</b>, runs pending jobs, and writes status back. No inbound connection to the Mac, no Tailscale, no extra queue service. Each platform gets a <b>manual/auto dial</b> in <code class='inl'>app_config</code>, so going auto later is one switch, not a rebuild.</p>",
 deeper:"The full distributions.platform enum is 9 values: youtube, rumble, dropbox, fireside_podcast, real_life_network, streamhoster, genesis_science_network, social_clip, other. Phase 1 builds triggers for four: YouTube, Rumble, Transistor (podcast), and Vizard (clips). Even on an aggressive pace, this ships manual-trigger first because a wrong publish is public.",
 analogy:"The dashboard is a dispatcher; the Mac is the truck. The dispatcher writes the orders and tracks the route, but you do not haul the cargo through the dispatcher's office. The heavy load rides the truck.",
 game:{type:"sort",h:"Runs where?",d:"Each job runs either on the Mac/worker (heavy) or in the dashboard (light). Sort them.",
   binA:"Mac / worker (heavy media)",binB:"Dashboard / Vercel (light)",
   items:[["The multi-GB master upload","A","Way over Vercel's 4.5 MB limit; runs on the Mac."],
          ["Transcription","A","Local Mac job, heavy compute."],
          ["Resumable YouTube upload","A","Chunked upload from the Mac/worker."],
          ["The Publish trigger button","B","Just writes a job row; light."],
          ["Per-platform status tracker","B","Reads job status; light."],
          ["Filling the metadata template","B","Tiny text operation; light."]]},
 quiz:[
  {q:"Why can the upload not run on Vercel?",o:["Vercel is too expensive","Vercel caps functions at 4.5 MB / 15 min; the master is multi-GB","Vercel blocks video"],a:1,e:"Heavy media runs on the Mac/worker; the dashboard only triggers and tracks."},
  {q:"How does the dashboard hand heavy work to the Mac?",o:["It SSHes into the Mac","It writes a row to a Supabase jobs table the Mac polls","Through Tailscale"],a:1,e:"The Mac polls a jobs table and writes status back. No inbound connection, no Tailscale."}
 ],
 decision:{question:"Lock the distribution architecture.",opts:[
   {id:"split",label:"Heavy work on Mac/worker, dashboard triggers + tracks via a Supabase jobs table, per-platform dial",tag:"recommended",rec:1,why:"Respects Vercel limits, ships manual now, flips to auto per platform with one switch."},
   {id:"vercelall",label:"Run everything inside the dashboard on Vercel",tag:"wont work",why:"The 4.5 MB / 15 min limits make multi-GB uploads impossible there."}],
  specs:[["Heavy jobs","Mac/worker: transcription + uploads"],["Dashboard","trigger + track only"],["Transport","Mac polls a Supabase jobs table"],["Dial","per-platform manual/auto in app_config"]]},
 spec:{status:"new",dependsOn:["m7","m8"],blockedBy:[],
  db:"NEW jobs table (id, type, payload jsonb, status, claimed_at, finished_at, error). distributions (exists) tracks per-platform status (9-value enum). app_config holds the per-platform dial.",
  routes:"/api/distribute writes a job row (light). A local Mac poller (not a Vercel route) claims and runs jobs. A /distribution tracker page reads distributions.",
  api:"Dashboard: INSERT into jobs. Mac: SELECT pending jobs, run, UPDATE status. No inbound connection to the Mac; no Tailscale.",
  io:"INPUT: a publish trigger. OUTPUT: a jobs row; the Mac runs it and writes per-platform status to distributions.",
  acceptance:["WHEN a publish is triggered THE SYSTEM SHALL insert a jobs row and return immediately, never attempting the upload on Vercel.",
   "WHEN the Mac poller finds a pending job THE SYSTEM SHALL claim it, run it, and write status back to distributions.",
   "IF a platform's dial is manual THEN publishing SHALL require an explicit human trigger.",
   "WHEN the dial is flipped to auto THE SYSTEM SHALL use the same code path with no rebuild."],
  verify:["npx tsc --noEmit","npx eslint src/","list_migrations (confirm the jobs table migration applied)","Manual: trigger a publish, confirm a jobs row appears and the Mac poller claims it and updates distributions."],
  nonauto:"The Mac/worker process is local; Daniel runs it on his machine."},
